name: Collection CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: Frontmatter audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run frontmatter audit
        run: python3 docs/scripts/audit.py

  flows:
    name: Flow manifest check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyyaml jsonschema pytest
      - name: Verify flow manifests match node graphs
        run: python3 skaileup/flows/_meta/verify_flows.py
      - name: Run flow verifier tests
        run: python3 -m pytest skaileup/flows/_meta/test_verify.py -q

  artifacts:
    name: Artifact registry check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Verify artifact registry vs skills
        run: python3 skaileup/contracts/scripts/verify_artifacts.py
