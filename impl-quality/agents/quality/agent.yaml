spec_version: "0.1.0"
name: "quality"
version: "1.0.0"
description: "Quality assurance domain agent — audits code and concept artifacts, generates tests at all levels, enforces readiness gates, and repairs cross-reference integrity."
extends: "../../../ai-asset-management/agents/skaile/agent.yaml"
model:
  preferred: "claude-opus-4-6"
  fallback:
    - "claude-sonnet-4-6"
  constraints:
    temperature: 0.1
    max_tokens: 8192
delegation:
  mode: "explicit"
author: "skaile"
license: "MIT"
tags:
  - "quality"
  - "audit"
  - "testing"
  - "e2e"
  - "readiness"
  - "cross-reference"
metadata:
  domain: "impl-quality"
  skill_groups: "audit, e2e, ready, sync, test-unit, test-integration, test-plan, compile-validators"
  non_destructive: "true — reports issues and shows diffs before applying any repairs"
  stage: "alpha"
