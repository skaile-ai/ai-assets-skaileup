id: simple-app
version: '2.0.0'
name: 'Simple App'
description: >-
  Single-user, ≤5 features. Linear concept pipeline (with brand-visual,
  journeys, screens, static-html walkthrough mockup, isolated-html component
  mockup, datamodel, full impl-build setup) followed by per-feature impl-slice
  loop (full: brainstorm omitted from impl-plan; align + plan-vertical +
  implement + test + recap + commit). Quality: unit + e2e. No concept-slice
  loop. Iteration semantics: impl-slice nodes (i-align..i-commit) are run
  once per feature in the plan-vertical backlog; the linear graph below
  shows one iteration.
meta:
  category: full-stack
  tags:
    - tier
    - simple-app
    - small
  icon: i-heroicons-cube
globals:
  research_depth: light
  approval_mode: checkpoint
  subagent_mode: false
  verbosity: standard
entry: scope
nodes:
  # --- Scope ---
  - id: scope
    type: skill
    position:
      x: 0
      y: 200
    data:
      skill: skaileup-scope-scope-project
      label: 'Scope Project'
      optional: false
      parameters: {}
  # --- Linear concept ---
  - id: brief
    type: skill
    position:
      x: 200
      y: 200
    data:
      skill: concept-brief
      label: 'Concept Brief'
      optional: false
      parameters: {}
  - id: brand-visual
    type: skill
    position:
      x: 400
      y: 200
    data:
      skill: design-brand-visual
      label: 'Brand Visual'
      optional: false
      parameters: {}
  - id: journeys
    type: skill
    position:
      x: 600
      y: 200
    data:
      skill: experience-journeys
      label: 'Experience Journeys'
      optional: false
      parameters: {}
  - id: features
    type: skill
    position:
      x: 800
      y: 200
    data:
      skill: product-spec-features
      label: 'Product Features'
      optional: false
      parameters: {}
  - id: screens
    type: skill
    position:
      x: 1000
      y: 200
    data:
      skill: experience-screens
      label: 'Experience Screens'
      optional: false
      parameters: {}
  - id: mock-static
    type: skill
    position:
      x: 1200
      y: 100
    data:
      skill: walkthrough-mockup-static-html
      label: 'Static HTML Walkthrough'
      optional: false
      parallel_group: mockups
      parameters: {}
  - id: comp-isolated
    type: skill
    position:
      x: 1200
      y: 300
    data:
      skill: component-mockup-isolated-html
      label: 'Isolated HTML Components'
      optional: false
      parallel_group: mockups
      parameters: {}
  # --- Architecture ---
  - id: techstack
    type: skill
    position:
      x: 1400
      y: 200
    data:
      skill: impl-architecture-techstack
      label: 'Tech Stack'
      optional: false
      parameters: {}
  - id: templates
    type: skill
    position:
      x: 1600
      y: 200
    data:
      skill: impl-architecture-templates-select
      label: 'Architecture Templates (deferred)'
      optional: true
      parameters: {}
  - id: datamodel
    type: skill
    position:
      x: 1800
      y: 200
    data:
      skill: impl-architecture-datamodel
      label: 'Data Model'
      optional: false
      parameters: {}
  # --- Build ---
  - id: scaffold
    type: skill
    position:
      x: 2000
      y: 200
    data:
      skill: impl-build-scaffold
      label: 'Scaffold'
      optional: false
      parameters: {}
  - id: foundation
    type: skill
    position:
      x: 2200
      y: 200
    data:
      skill: impl-build-foundation
      label: 'Foundation'
      optional: false
      parameters: {}
  - id: migrate
    type: skill
    position:
      x: 2400
      y: 200
    data:
      skill: impl-build-migrate
      label: 'Migrate'
      optional: false
      parameters: {}
  - id: seed
    type: skill
    position:
      x: 2600
      y: 200
    data:
      skill: impl-build-seed
      label: 'Seed'
      optional: false
      parameters: {}
  - id: docs
    type: skill
    position:
      x: 2800
      y: 200
    data:
      skill: impl-build-docs
      label: 'Build Docs'
      optional: false
      parameters: {}
  # --- Per-feature impl-slice loop (no impl-plan-brainstorm, no refactor) ---
  - id: i-align
    type: skill
    position:
      x: 3000
      y: 200
    data:
      skill: impl-plan-align
      label: 'Slice: Align'
      optional: false
      parameters: {}
  - id: i-plan-vertical
    type: skill
    position:
      x: 3200
      y: 200
    data:
      skill: impl-plan-plan-vertical
      label: 'Slice: Vertical Plan'
      optional: false
      parameters: {}
  - id: i-implement
    type: skill
    position:
      x: 3400
      y: 200
    data:
      skill: impl-slice-implement
      label: 'Slice: Implement'
      optional: false
      parameters: {}
  - id: i-test
    type: skill
    position:
      x: 3600
      y: 200
    data:
      skill: impl-slice-test
      label: 'Slice: Test'
      optional: false
      parameters: {}
  - id: i-recap
    type: skill
    position:
      x: 3800
      y: 200
    data:
      skill: impl-slice-recap
      label: 'Slice: Recap'
      optional: false
      parameters: {}
  - id: i-commit
    type: skill
    position:
      x: 4000
      y: 200
    data:
      skill: impl-slice-commit
      label: 'Slice: Commit'
      optional: false
      parameters: {}
  # --- Quality ---
  - id: q-test-unit
    type: skill
    position:
      x: 4200
      y: 200
    data:
      skill: impl-quality-test-unit
      label: 'Unit Tests'
      optional: false
      parameters: {}
  - id: q-test-e2e
    type: skill
    position:
      x: 4400
      y: 200
    data:
      skill: impl-quality-test-e2e
      label: 'E2E Tests'
      optional: false
      parameters: {}
edges:
  - id: e-scope-brief
    source: scope
    target: brief
    type: flow
  - id: e-brief-brand-visual
    source: brief
    target: brand-visual
    type: flow
  - id: e-brand-visual-journeys
    source: brand-visual
    target: journeys
    type: flow
  - id: e-journeys-features
    source: journeys
    target: features
    type: flow
  - id: e-features-screens
    source: features
    target: screens
    type: flow
  - id: e-screens-mock-static
    source: screens
    target: mock-static
    type: parallel
  - id: e-screens-comp-isolated
    source: screens
    target: comp-isolated
    type: parallel
  - id: e-mock-static-techstack
    source: mock-static
    target: techstack
