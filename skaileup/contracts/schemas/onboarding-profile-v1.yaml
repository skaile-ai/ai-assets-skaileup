id: onboarding-profile-v1
description: 'Machine-readable project identity produced by concept-grounding-onboard. Stored at _grounding/onboarding/profile.yaml.'
version: 1
type: object
required: [name, problem, audience, type, created, tiers]
properties:
  name:
    type: string
    description: 'Project name'
  problem:
    type: string
    description: 'Problem statement — what pain this project solves'
  audience:
    type: string
    description: 'Target audience description'
  type:
    type: string
    enum: [web-app, cli-tool, api-service, library, data-pipeline, mobile-app]
    description: 'Project type — determines which artifact profile to load'
  created:
    type: string
    format: date
    description: 'Project creation date (ISO 8601)'
  tiers:
    type: object
    description: 'Per-domain tier settings (none/light/medium/max)'
    properties:
      concept-grounding-research: { type: string, enum: [none, light, medium, max] }
      design: { type: string, enum: [none, light, medium, max] }
      experience: { type: string, enum: [none, light, medium, max] }
      mockup-walkthrough: { type: string, enum: [none, light, medium, max] }
      mockup-component-storybook: { type: string, enum: [none, light, medium, max] }
      impl-architecture: { type: string, enum: [none, light, medium, max] }
      ops: { type: string, enum: [none, light, medium, max] }
    additionalProperties:
      type: string
      enum: [none, light, medium, max]

example:
  name: 'ProjectFlow'
  problem: 'Teams waste hours manually syncing project status across tools'
  audience: 'Engineering managers at mid-size companies (50-500 people)'
  type: web-app
  created: '2026-04-25'
  tiers:
    concept-grounding-research: medium
    design: medium
    experience: medium
    impl-architecture: medium
    mockup-walkthrough: light
    mockup-component-storybook: none
    ops: light
