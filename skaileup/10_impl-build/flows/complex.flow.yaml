id: 'complex'
version: '2.0.0'
name: 'complex'
description: 'Full-checkpoint implementation for complex projects: every setup phase (scaffold, foundation, infrastructure) gets its own approval gate before proceeding. Maximum visibility and control.'
metadata:
  tags:
    - 'implementation'
    - 'complex'
    - 'enterprise'
    - 'checkpointed'
  stage: 'stable'
  icon: 'i-heroicons-adjustments-horizontal'
  category: 'full-stack'
globals:
  research_depth: 'skip'
  approval_mode: 'checkpoint'
  auto_review: true
  subagent_mode: true
  verbosity: 'verbose'
modes:
  research:
    enabled: false
  standards:
    enabled: true
    skill: 'impl-quality-standards-discover'
    inject_skill: 'impl-quality-standards-inject'
    trigger_after: 'scaffold'
artifact_handoff:
  from_concept:
    - features
    - screens
    - datamodel
    - techstack
    - architecture
    - onboarding-decisions
entry: 'scaffold'
nodes:
  - id: 'g-setup'
    type: 'group'
    position:
      x: 0
      y: 0
    style:
      width: 800
      height: 280
      backgroundColor: 'rgba(16,185,129,0.04)'
      border: '1px solid rgba(16,185,129,0.2)'
      borderRadius: '12px'
    data:
      label: 'Setup (fully checkpointed)'
      phase: 'setup'
  - id: 'scaffold'
    type: 'skill'
    parentNode: 'g-setup'
    position:
      x: 40
      y: 120
    data:
      skill: 'impl-build-scaffold'
      label: 'Scaffold'
      optional: false
      parameters:
        package_manager: 'bun'
  - id: 'foundation'
    type: 'skill'
    parentNode: 'g-setup'
    position:
      x: 280
      y: 120
    data:
      skill: 'impl-build-foundation'
      label: 'Foundation'
      optional: false
  - id: 'infrastructure'
    type: 'skill'
    parentNode: 'g-setup'
    position:
      x: 520
      y: 120
    data:
      skill: 'impl-build-infrastructure'
      label: 'Infrastructure'
      optional: true
      condition: 'architecture.md exists AND custom_modules is non-empty OR non-standard apps present'
      note: 'Agent-evaluated skip: if condition is false, records infrastructure=skipped in progress.json'
  - id: 'g-implement'
    type: 'group'
    position:
      x: 840
      y: 0
    style:
      width: 1280
      height: 360
      backgroundColor: 'rgba(16,185,129,0.04)'
      border: '1px solid rgba(16,185,129,0.2)'
      borderRadius: '12px'
    data:
      label: 'Implementation'
      phase: 'implementation'
  - id: 'migrate'
    type: 'skill'
    parentNode: 'g-implement'
    position:
      x: 40
      y: 80
    data:
      skill: 'impl-build-migrate'
      label: 'Migrate'
      optional: false
  - id: 'seed'
    type: 'skill'
    parentNode: 'g-implement'
    position:
      x: 40
      y: 240
    data:
      skill: 'impl-build-seed'
      label: 'Seed'
      optional: false
  - id: 'implement-feature'
    type: 'skill'
    parentNode: 'g-implement'
    position:
      x: 280
      y: 160
    data:
      skill: 'impl-build-implement-feature'
      label: 'Feature'
      optional: false
      subagent: true
      parameters:
        tdd: true
  - id: 'test-unit'
    type: 'skill'
    parentNode: 'g-implement'
    position:
      x: 520
      y: 80
    data:
      skill: 'impl-quality-test-unit'
      label: 'Unit Tests'
      optional: false
      subagent: true
  - id: 'test-integration'
    type: 'skill'
    parentNode: 'g-implement'
    position:
      x: 520
      y: 240
    data:
      skill: 'impl-quality-test-integration'
      label: 'Integration Tests'
      optional: false
      subagent: true
  - id: 'e2e'
    type: 'skill'
    parentNode: 'g-implement'
    position:
      x: 760
      y: 160
    data:
      skill: 'impl-quality-test-e2e'
      label: 'E2E Tests'
      optional: true
      subagent: true
  - id: 'verify'
    type: 'skill'
    parentNode: 'g-implement'
    position:
      x: 1000
      y: 160
    data:
      skill: 'verify'
      label: 'Verify'
      optional: false
      subagent: true
edges:
  - id: 'e-scaffold-foundation'
    source: 'scaffold'
    target: 'foundation'
    type: 'flow'
  - id: 'e-foundation-infrastructure'
    source: 'foundation'
    target: 'infrastructure'
    type: 'optional'
  - id: 'e-foundation-migrate'
    source: 'foundation'
    target: 'migrate'
    type: 'flow'
  - id: 'e-foundation-feature'
    source: 'foundation'
    target: 'implement-feature'
    type: 'flow'
  - id: 'e-infrastructure-migrate'
    source: 'infrastructure'
    target: 'migrate'
    type: 'optional'
  - id: 'e-infrastructure-feature'
    source: 'infrastructure'
    target: 'implement-feature'
    type: 'optional'
  - id: 'e-migrate-seed'
    source: 'migrate'
    target: 'seed'
    type: 'flow'
  - id: 'e-feature-unit'
    source: 'implement-feature'
    target: 'test-unit'
    type: 'flow'
  - id: 'e-feature-integration'
    source: 'implement-feature'
    target: 'test-integration'
    type: 'flow'
  - id: 'e-feature-e2e'
    source: 'implement-feature'
    target: 'e2e'
    type: 'optional'
  - id: 'e-unit-verify'
    source: 'test-unit'
    target: 'verify'
    type: 'flow'
  - id: 'e-integration-verify'
    source: 'test-integration'
    target: 'verify'
    type: 'flow'
  - id: 'e-e2e-verify'
    source: 'e2e'
    target: 'verify'
    type: 'optional'
next_flows:
  - id: 'audit'
    domain: 'impl-quality'
    label: 'Audit →'
    hint: 'Run static analysis and structure audit on the implemented codebase.'
