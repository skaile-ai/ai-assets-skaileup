id: 'reverse-engineer'
version: '2.0.0'
name: 'Reverse Engineer'
description: 'Extract a full concept from an existing codebase, then optionally continue with any concept or implementation steps.'
metadata:
  tags:
    - 'reverse-engineer'
    - 'existing-codebase'
    - 'extraction'
    - 'migration'
  stage: 'stable'
  icon: 'i-heroicons-arrow-path'
  category: 'maintenance'
  onboarding:
    input_style: 'repo'
    fields:
      - 'repo_path'
      - 'branch'
      - 'context'
globals:
  research_depth: 'light'
  approval_mode: 'checkpoint'
  auto_review: false
  subagent_mode: true
  verbosity: 'detailed'
tier_presets:
  quick:
    experience: light
    impl-architecture: light
    component-mockup-storybook: none
    ops: none
  standard:
    experience: medium
    impl-architecture: medium
    component-mockup-storybook: none
    ops: light
  thorough:
    experience: max
    impl-architecture: max
    component-mockup-storybook: medium
    ops: medium
modes:
  research:
    enabled: false
  standards:
    enabled: true
    skill: 'impl-quality-standards-discover'
    inject_skill: 'impl-quality-standards-inject'
    trigger_after: 'reverse-engineer'
    parameters:
      note: 'Discover conventions from the repo being reverse-engineered'
entry: 'reverse-engineer'
nodes:
  - id: 'g-extract'
    type: 'group'
    position:
      x: 0
      y: 0
    style:
      width: 400
      height: 240
      backgroundColor: 'rgba(245,158,11,0.04)'
      border: '1px solid rgba(245,158,11,0.2)'
      borderRadius: '12px'
    data:
      label: 'Extraction'
      phase: 'reverse-engineer'
  - id: 'g-optional-concept'
    type: 'group'
    position:
      x: 440
      y: 0
    style:
      width: 1080
      height: 240
      backgroundColor: 'rgba(99,102,241,0.04)'
      border: '1px dashed rgba(99,102,241,0.3)'
      borderRadius: '12px'
    data:
      label: 'Optional — Continue with Concept Steps'
      phase: 'conceptualization'
  - id: 'reverse-engineer'
    type: 'skill'
    parentNode: 'g-extract'
    position:
      x: 40
      y: 100
    data:
      skill: 'ops-reverse-engineer'
      label: 'Reverse Engineer'
      optional: false
      subagent: true
      parameters:
        extraction_scope:
          - 'overview'
          - 'features'
          - 'screens'
          - 'datamodel'
          - 'techstack'
  - id: 'journeys'
    type: 'skill'
    parentNode: 'g-optional-concept'
    position:
      x: 40
      y: 60
    data:
      skill: 'experience-journeys'
      label: 'User Journeys'
      optional: true
      depth_from: 'experience'
      skip_when: "tier.experience in ['none', 'light']"
      parameters:
        note: 'Derive journeys from the extracted concept'
  - id: 'architecture'
    type: 'skill'
    parentNode: 'g-optional-concept'
    position:
      x: 280
      y: 60
    data:
      skill: 'impl-architecture-system'
      label: 'Architecture'
      optional: true
      depth_from: 'impl-architecture'
      subagent: true
      extend_when: "artifact.architecture.status == 'seed-partial'"
  - id: 'datamodel'
    type: 'skill'
    parentNode: 'g-optional-concept'
    position:
      x: 280
      y: 160
    data:
      skill: 'impl-architecture-datamodel'
      label: 'Data Model'
      optional: true
      depth_from: 'impl-architecture'
      subagent: true
      extend_when: "artifact.datamodel.status == 'seed-partial'"
  - id: 'screens'
    type: 'skill'
    parentNode: 'g-optional-concept'
    position:
      x: 560
      y: 100
    data:
      skill: 'experience-screens'
      label: 'Screens'
      optional: true
      depth_from: 'experience'
      subagent: true
  - id: 'storybook'
    type: 'skill'
    parentNode: 'g-optional-concept'
    position:
      x: 560
      y: 160
    data:
      skill: 'component-mockup-storybook'
      label: 'Storybook'
      optional: true
      depth_from: 'component-mockup-storybook'
      skip_when: "tier.component-mockup-storybook == 'none'"
edges:
  - id: 'e-re-journeys'
    source: 'reverse-engineer'
    target: 'journeys'
    type: 'optional'
  - id: 'e-re-architecture'
    source: 'reverse-engineer'
    target: 'architecture'
    type: 'optional'
  - id: 'e-re-datamodel'
    source: 'reverse-engineer'
    target: 'datamodel'
    type: 'optional'
  - id: 'e-re-screens'
    source: 'reverse-engineer'
    target: 'screens'
    type: 'optional'
  - id: 'e-architecture-dm'
    source: 'architecture'
    target: 'datamodel'
    type: 'optional'
  - id: 'e-datamodel-screens'
    source: 'datamodel'
    target: 'screens'
    type: 'optional'
  - id: 'e-screens-storybook'
    source: 'screens'
    target: 'storybook'
    type: 'optional'
next_flows:
  - id: 'concept-only'
    domain: 'concept-grounding-onboard'
    label: 'Enrich Concept →'
    hint: 'Run the full concept pipeline to enrich and validate the extracted concept.'
  - id: 'standard'
    domain: 'impl-build'
    label: 'Implement →'
    hint: 'Proceed to implementation using the extracted concept as foundation.'
    artifact_handoff:
      - features
      - screens
      - datamodel
      - techstack
      - architecture
      - onboarding-decisions
