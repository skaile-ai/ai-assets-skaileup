id: skaileup-impl-standalone
version: '2.0.0'
name: 'SkaileUp Impl Standalone'
description: >-
  Self-sufficient implementation flow — needs no prior concept package. It
  produces just the technical concept it requires (techstack -> system
  architecture -> datamodel) from a one-line product description, then runs
  build setup (scaffold -> foundation -> infrastructure(opt) -> migrate ->
  seed -> docs), delegates per-feature work to the impl-slice sub-flow (each
  feature's spec is elicited just-in-time by the slice's impl-plan brainstorm/
  align phase), and finishes with quality (unit + integration + e2e + ready).
  No UX/brand/journeys/screens/mockups — only the architecture subset needed to
  write and run code. Use when you want to start building immediately without a
  full concept pass and without a handoff package.
meta:
  category: incremental
  tags:
    - impl-only
    - standalone
    - no-concept
    - build
  icon: i-heroicons-bolt
requires:
  # Self-contained install manifest: contracts its skills read + every skill its
  # nodes run + the sub-flow it delegates to. Exact — no inheritance, no extras.
  # Includes the architecture subset (techstack/system/datamodel) so the flow is
  # self-sufficient; no UX/brand/experience concept skills.
  - contract:@skaile-ai/shared-contracts
  - contract:@skaile-ai/implementation-contract
  - skill:@skaile-ai/impl-architecture-techstack
  - skill:@skaile-ai/impl-architecture-system
  - skill:@skaile-ai/impl-architecture-datamodel
  - skill:@skaile-ai/impl-build-scaffold
  - skill:@skaile-ai/impl-build-foundation
  - skill:@skaile-ai/impl-build-infrastructure
  - skill:@skaile-ai/impl-build-migrate
  - skill:@skaile-ai/impl-build-seed
  - skill:@skaile-ai/impl-build-docs
  - flow:@skaile-ai/skaileup-impl-slice
  - skill:@skaile-ai/impl-quality-test-unit
  - skill:@skaile-ai/impl-quality-test-integration
  - skill:@skaile-ai/impl-quality-test-e2e
  - skill:@skaile-ai/impl-quality-ready
globals:
  research_depth: light
  approval_mode: checkpoint
  subagent_mode: true
  verbosity: standard
entry: techstack
nodes:
  # --- Technical concept subset (generated here, not handed off) ---
  - id: techstack
    type: skill
    position:
      x: 0
      y: 200
    data:
      skill: impl-architecture-techstack
      label: 'Tech Stack'
      optional: false
      parameters:
        note: 'Elicit stack from a one-line product description; no concept package assumed'
  - id: arch-system
    type: skill
    position:
      x: 200
      y: 200
    data:
      skill: impl-architecture-system
      label: 'System Architecture'
      optional: false
      parameters: {}
  - id: datamodel
    type: skill
    position:
      x: 400
      y: 200
    data:
      skill: impl-architecture-datamodel
      label: 'Data Model'
      optional: false
      parameters: {}
  # --- Build setup ---
  - id: scaffold
    type: skill
    position:
      x: 600
      y: 200
    data:
      skill: impl-build-scaffold
      label: 'Scaffold'
      optional: false
      parameters: {}
  - id: foundation
    type: skill
    position:
      x: 800
      y: 200
    data:
      skill: impl-build-foundation
      label: 'Foundation'
      optional: false
      parameters: {}
  - id: infra-opt
    type: skill
    position:
      x: 1000
      y: 200
    data:
      skill: impl-build-infrastructure
      label: 'Infrastructure (opt)'
      optional: true
      parameters: {}
  - id: migrate
    type: skill
    position:
      x: 1200
      y: 200
    data:
      skill: impl-build-migrate
      label: 'Migrate'
      optional: false
      parameters: {}
  - id: seed
    type: skill
    position:
      x: 1400
      y: 200
    data:
      skill: impl-build-seed
      label: 'Seed'
      optional: false
      parameters: {}
  - id: docs
    type: skill
    position:
      x: 1600
      y: 200
    data:
      skill: impl-build-docs
      label: 'Build Docs'
      optional: false
      parameters: {}
  # --- Per-feature impl-slice loop (delegated to the impl-slice flow) ---
  - id: impl-slice-loop
    type: sub-flow
    position:
      x: 1800
      y: 200
    data:
      flow: skaileup-impl-slice
      domain: impl-slice
      label: 'Per-feature impl-slice loop (spec elicited per slice)'
      pass_context: true
  # --- Quality ---
  - id: q-test-unit
    type: skill
    position:
      x: 2000
      y: 200
    data:
      skill: impl-quality-test-unit
      label: 'Unit Tests'
      optional: false
      parameters: {}
  - id: q-test-integration
    type: skill
    position:
      x: 2200
      y: 200
    data:
      skill: impl-quality-test-integration
      label: 'Integration Tests'
      optional: false
      parameters: {}
  - id: q-test-e2e
    type: skill
    position:
      x: 2400
      y: 200
    data:
      skill: impl-quality-test-e2e
      label: 'E2E Tests'
      optional: true
      parameters: {}
  - id: q-ready
    type: skill
    position:
      x: 2600
      y: 200
    data:
      skill: impl-quality-ready
      label: 'Release Ready'
      optional: false
      parameters: {}
edges:
  - id: e-techstack-arch-system
    source: techstack
    target: arch-system
    type: flow
  - id: e-arch-system-datamodel
    source: arch-system
    target: datamodel
    type: flow
  - id: e-datamodel-scaffold
    source: datamodel
    target: scaffold
    type: flow
  - id: e-scaffold-foundation
    source: scaffold
    target: foundation
    type: flow
  - id: e-foundation-infra-opt
    source: foundation
    target: infra-opt
    type: optional
  - id: e-infra-opt-migrate
    source: infra-opt
    target: migrate
    type: flow
  - id: e-migrate-seed
    source: migrate
    target: seed
    type: flow
  - id: e-seed-docs
    source: seed
    target: docs
    type: flow
  - id: e-docs-impl-slice-loop
    source: docs
    target: impl-slice-loop
    type: flow
  - id: e-impl-slice-loop-q-test-unit
    source: impl-slice-loop
    target: q-test-unit
    type: flow
  - id: e-q-test-unit-q-test-integration
    source: q-test-unit
    target: q-test-integration
    type: flow
  - id: e-q-test-integration-q-test-e2e
    source: q-test-integration
    target: q-test-e2e
    type: flow
  - id: e-q-test-e2e-q-ready
    source: q-test-e2e
    target: q-ready
    type: flow
