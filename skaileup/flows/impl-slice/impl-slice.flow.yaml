id: impl-slice
version: '2.0.0'
name: 'Impl Slice'
description: >-
  Per-feature implementation loop: impl-plan brainstorm -> align -> plan-vertical,
  then the full impl-slice loop git-prepare -> supervised -> implement ->
  implement-page -> test -> recap -> refactor -> commit -> git-finish. Supervised
  dispatch (two-stage review) runs inside every slice. Canonical building block
  consumed by the tier flows (appbuilder-simple, appbuilder-standard, appbuilder-complex, appbuilder-cli),
  which delegate to it via a sub-flow node rather than inlining. Iteration
  semantics: tier orchestrators run this slice once per feature in their
  plan-vertical backlog. Slice flow is standalone-runnable for testability.
meta:
  category: incremental
  tags:
    - impl-slice
    - per-feature
    - slice
  icon: i-heroicons-arrow-path
requires:
  # Everything installed when this flow is installed: the contract its skills
  # read + every skill its nodes run (flow node order). Self-contained.
  - contract:@skaile-ai/shared-contracts
  - skill:@skaile-ai/impl-plan-brainstorm
  - skill:@skaile-ai/impl-plan-align
  - skill:@skaile-ai/impl-plan-plan-vertical
  - skill:@skaile-ai/impl-slice-git-prepare
  - skill:@skaile-ai/impl-plan-supervised
  - skill:@skaile-ai/impl-slice-implement
  - skill:@skaile-ai/impl-slice-implement-page
  - skill:@skaile-ai/impl-slice-test
  - skill:@skaile-ai/impl-slice-recap
  - skill:@skaile-ai/impl-slice-refactor
  - skill:@skaile-ai/impl-slice-commit
  - skill:@skaile-ai/impl-slice-git-finish
globals:
  research_depth: skip
  approval_mode: checkpoint
  subagent_mode: false
  verbosity: standard
entry: i-brainstorm
nodes:
  - id: i-brainstorm
    type: skill
    position:
      x: 0
      y: 200
    data:
      skill: impl-plan-brainstorm
      label: 'Plan: Brainstorm'
      optional: false
      subagent: false
      parameters: {}
  - id: i-align
    type: skill
    position:
      x: 200
      y: 200
    data:
      skill: impl-plan-align
      label: 'Plan: Align'
      optional: false
      subagent: false
      parameters: {}
  - id: i-plan-vertical
    type: skill
    position:
      x: 400
      y: 200
    data:
      skill: impl-plan-plan-vertical
      label: 'Plan: Vertical Plan'
      optional: false
      subagent: false
      parameters: {}
  - id: i-git-prepare
    type: skill
    position:
      x: 600
      y: 200
    data:
      skill: impl-slice-git-prepare
      label: 'Slice: Git Prepare'
      optional: false
      subagent: false
      parameters: {}
  - id: i-supervised
    type: skill
    position:
      x: 700
      y: 200
    data:
      skill: impl-plan-supervised
      label: 'Slice: Supervised Dispatch'
      optional: false
      subagent: true
      parameters: {}
  - id: i-implement
    type: skill
    position:
      x: 800
      y: 200
    data:
      skill: impl-slice-implement
      label: 'Slice: Implement'
      optional: false
      subagent: false
      parameters: {}
  - id: i-implement-page
    type: skill
    position:
      x: 1000
      y: 200
    data:
      skill: impl-slice-implement-page
      label: 'Slice: Implement Page'
      optional: true
      subagent: false
      parameters: {}
  - id: i-test
    type: skill
    position:
      x: 1200
      y: 200
    data:
      skill: impl-slice-test
      label: 'Slice: Test'
      optional: false
      subagent: false
      parameters: {}
  - id: i-recap
    type: skill
    position:
      x: 1400
      y: 200
    data:
      skill: impl-slice-recap
      label: 'Slice: Recap'
      optional: false
      subagent: false
      parameters: {}
  - id: i-refactor
    type: skill
    position:
      x: 1600
      y: 200
    data:
      skill: impl-slice-refactor
      label: 'Slice: Refactor'
      optional: false
      subagent: false
      parameters: {}
  - id: i-commit
    type: skill
    position:
      x: 1800
      y: 200
    data:
      skill: impl-slice-commit
      label: 'Slice: Commit'
      optional: false
      subagent: false
      parameters: {}
  - id: i-finish
    type: skill
    position:
      x: 2000
      y: 200
    data:
      skill: impl-slice-git-finish
      label: 'Slice: Git Finish'
      optional: false
      subagent: false
      parameters: {}
edges:
  - id: e-i-brainstorm-i-align
    source: i-brainstorm
    target: i-align
    type: flow
  - id: e-i-align-i-plan-vertical
    source: i-align
    target: i-plan-vertical
    type: flow
  - id: e-i-plan-vertical-i-git-prepare
    source: i-plan-vertical
    target: i-git-prepare
    type: flow
  - id: e-i-git-prepare-i-supervised
    source: i-git-prepare
    target: i-supervised
    type: flow
  - id: e-i-supervised-i-implement
    source: i-supervised
    target: i-implement
    type: flow
  - id: e-i-implement-i-implement-page
    source: i-implement
    target: i-implement-page
    type: optional
  - id: e-i-implement-page-i-test
    source: i-implement-page
    target: i-test
    type: flow
  - id: e-i-test-i-recap
    source: i-test
    target: i-recap
    type: flow
  - id: e-i-recap-i-refactor
    source: i-recap
    target: i-refactor
    type: flow
  - id: e-i-refactor-i-commit
    source: i-refactor
    target: i-commit
    type: flow
  - id: e-i-commit-i-finish
    source: i-commit
    target: i-finish
    type: flow
