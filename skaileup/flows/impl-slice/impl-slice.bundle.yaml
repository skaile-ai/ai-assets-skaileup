name: impl-slice
description: >-
  Per-feature impl loop — impl-plan brainstorm -> align -> plan-vertical, then
  impl-slice implement -> test -> recap -> refactor -> commit. Used directly
  by simple-app/standard-app/complex-app tier flows; inlined as nodes. Leaf
  bundle (no inheritance).
metadata:
  version: '1.0.0'
  tags:
    - bundle
    - impl-slice
    - per-feature
    - slice
  stage: alpha
requires:
  - skill:impl-plan-brainstorm@skaile-ai
  - skill:impl-plan-align@skaile-ai
  - skill:impl-plan-plan-vertical@skaile-ai
  - skill:impl-slice-implement@skaile-ai
  - skill:impl-slice-test@skaile-ai
  - skill:impl-slice-recap@skaile-ai
  - skill:impl-slice-refactor@skaile-ai
  - skill:impl-slice-commit@skaile-ai
