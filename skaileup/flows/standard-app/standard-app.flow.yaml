id: standard-app
version: '2.0.0'
name: 'Standard App'
description: >-
  Multi-user / ≤20 features. High-level concept (brief, goals,
  comparable, brand-visual, inspiration, journeys,
  behaviors(opt), screens, components, features, mockups, mockup-feedback
  cluster) -> impl-build setup -> per-feature loop:
  concept-slice (align -> scope-feature -> design-feature; NO brainstorm) ->
  impl-slice (full: brainstorm -> align -> plan-vertical -> implement -> test
  -> recap -> refactor -> commit) -> done. Quality: unit + integration + e2e
  + ready. Ops: review + sync. Iteration semantics: cs-align..i-commit run
  once per feature; the linear graph below shows one iteration.
meta:
  category: full-stack
  tags:
    - tier
    - standard-app
    - multi-user
  icon: i-heroicons-squares-2x2
requires:
  # Everything installed when this flow is installed: the contracts its skills
  # read + every skill its nodes run (flow node order). Self-contained — no
  # inheritance, no extras.
  - contract:@skaile-ai/shared-contracts
  - contract:@skaile-ai/implementation-contract
  - skill:@skaile-ai/skaileup-scope-scope-project
  - skill:@skaile-ai/concept-brief
  - skill:@skaile-ai/concept-goals
  - skill:@skaile-ai/concept-comparable
  - skill:@skaile-ai/design-brand-visual
  - skill:@skaile-ai/design-inspiration
