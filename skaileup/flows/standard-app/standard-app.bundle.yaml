name: standard-app
description: >-
  Tier bundle for standard-app — multi-user / ≤20 features. Inherits
  simple-app; adds concept-slice (align/scope-feature/design-feature),
  impl-plan-brainstorm, impl-slice-refactor, full quality suite (integration
  + ready), ops review/sync, system architecture + infrastructure build,
  experience-behaviors/components, storybook, deferred concept-goals/
  concept-comparable/design-inspiration, deferred mockup-feedback cluster,
  deferred mockup-walkthrough-astro.
  Note: standard-app's flow does NOT use mockup-component-isolated-html
  (Storybook supersedes it); installing it as part of the inheritance chain
  is a no-op (skill is available; just not invoked by standard-app.flow.yaml).
metadata:
  version: '1.0.0'
  tags:
    - bundle
    - tier
    - standard-app
    - multi-user
  stage: alpha
requires:
  - bundle:simple-app@skaile-ai
  # delta vs simple-app (computed from flows):
  - skill:concept-goals@skaile-ai
  - skill:concept-comparable@skaile-ai
  - skill:design-inspiration@skaile-ai
  - skill:experience-behaviors@skaile-ai
  - skill:experience-components@skaile-ai
  - skill:mockup-walkthrough-astro@skaile-ai
  - skill:mockup-component-storybook@skaile-ai
  - skill:mockup-feedback-annotate@skaile-ai
  - skill:mockup-feedback-triage@skaile-ai
  - skill:mockup-feedback-patch@skaile-ai
  - skill:mockup-feedback-apply@skaile-ai
  - skill:impl-architecture-system@skaile-ai
  - skill:impl-build-infrastructure@skaile-ai
  - skill:impl-plan-brainstorm@skaile-ai
  - skill:concept-slice-align@skaile-ai
  - skill:concept-slice-scope-feature@skaile-ai
  - skill:concept-slice-design-feature@skaile-ai
  - skill:impl-slice-refactor@skaile-ai
  - skill:impl-quality-test-integration@skaile-ai
  - skill:impl-quality-ready@skaile-ai
  - skill:ops-review@skaile-ai
  - skill:ops-sync@skaile-ai
