name: standard-app
description: >-
  Tier bundle for standard-app — multi-user / ≤20 features. Inherits
  simple-app; adds concept-slice (align/scope-feature/design-feature),
  impl-plan-brainstorm, impl-slice-refactor, full quality suite (integration
  + ready), ops review/sync, system architecture + infrastructure build,
  experience-behaviors/components, storybook, deferred concept-goals/
  concept-comparable/design-inspiration, deferred mockup-feedback cluster,
  deferred mockup-walkthrough-astro.
  Note: standard-app's flow does NOT use mockup-component-isolated-html
  (Storybook supersedes it); installing it as part of the inheritance chain
  is a no-op (skill is available; just not invoked by standard-app.flow.yaml).
metadata:
  version: '1.0.0'
  tags:
    - bundle
    - tier
    - standard-app
    - multi-user
  stage: alpha
requires:
  - flow:@skaile-ai/standard-app
  - bundle:@skaile-ai/simple-app
  # contracts (shared-contracts + implementation-contract) inherited via simple-app
  # delta vs simple-app (computed from flows):
  - skill:@skaile-ai/concept-goals
  - skill:@skaile-ai/concept-comparable
  - skill:@skaile-ai/design-inspiration
  - skill:@skaile-ai/experience-behaviors
  - skill:@skaile-ai/experience-components
  - skill:@skaile-ai/mockup-walkthrough-astro
  - skill:@skaile-ai/mockup-component-storybook
  - skill:@skaile-ai/mockup-feedback-annotate
  - skill:@skaile-ai/mockup-feedback-triage
  - skill:@skaile-ai/mockup-feedback-patch
  - skill:@skaile-ai/mockup-feedback-apply
  - skill:@skaile-ai/impl-architecture-system
  - skill:@skaile-ai/impl-build-infrastructure
  - skill:@skaile-ai/impl-plan-brainstorm
  - skill:@skaile-ai/concept-slice-align
  - skill:@skaile-ai/concept-slice-scope-feature
  - skill:@skaile-ai/concept-slice-design-feature
  - skill:@skaile-ai/impl-slice-refactor
  - skill:@skaile-ai/impl-quality-test-integration
  - skill:@skaile-ai/impl-quality-ready
  - skill:@skaile-ai/ops-review
  - skill:@skaile-ai/ops-sync
