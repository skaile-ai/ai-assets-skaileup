id: skaileup-slice
version: '2.0.0'
name: 'SkaileUp Slice'
description: >-
  The unified per-feature building block: run the feature's concept half then its
  implementation half. Delegates to two sub-flows — skaileup-slice-concept then
  skaileup-slice-impl. A concept_depth global selects how much concept is produced
  per feature and is passed through to the concept sub-flow:
  `full` = complete per-feature concept design before building (used by the
  appbuilder-standard / appbuilder-complex tiers);
  `just-in-time` = the concept-needs check builds only the missing concept
  fragments this feature requires, with the user, as a by-product of building
  (used by the start-in-the-middle skaileup-implementation flow);
  `skip` = concept already exists up-front, run impl only.
  Iteration semantics: a consumer runs this once per feature in its backlog (or
  loops it via a review-loop edge). Standalone-runnable for testability.
meta:
  category: incremental
  tags:
    - slice
    - per-feature
    - concept-and-impl
  icon: i-heroicons-squares-2x2
requires:
  # Self-contained install manifest: the shared contract every skill reads plus
  # the two sub-flows this block delegates to. The sub-flows' own manifests
  # transitively provide their node skills — not re-listed here.
  - contract:@skaile-ai/shared-contracts
  - flow:@skaile-ai/skaileup-slice-concept
  - flow:@skaile-ai/skaileup-slice-impl
globals:
  research_depth: light
  approval_mode: checkpoint
  subagent_mode: false
  verbosity: standard
  # full | just-in-time | skip — consumers override via this node's
  # parameters.concept_depth; forwarded to the concept sub-flow.
  concept_depth: full
entry: slice-concept
nodes:
  - id: slice-concept
    type: sub-flow
    position:
      x: 0
      y: 200
    data:
      flow: skaileup-slice-concept
      domain: slice
      label: 'Feature concept (depth = concept_depth)'
      pass_context: true
      parameters:
        concept_depth: '${concept_depth}'
  - id: slice-impl
    type: sub-flow
    position:
      x: 240
      y: 200
    data:
      flow: skaileup-slice-impl
      domain: slice
      label: 'Build the feature'
      pass_context: true
      parameters: {}
edges:
  - id: e-slice-concept-slice-impl
    source: slice-concept
    target: slice-impl
    type: flow
