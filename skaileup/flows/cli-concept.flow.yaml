id: 'cli-concept'
version: '2.0.0'
name: 'CLI Concept'
description: 'Concept phase for command-line tools. No UI, no brand, no screens. Covers project brief, commands/features, tech stack, and data model.'
metadata:
  tags:
    - 'cli'
    - 'tool'
    - 'no-ui'
    - 'concept'
  stage: 'stable'
  icon: 'i-heroicons-command-line'
  category: 'cli'
  onboarding:
    input_style: 'freeform'
    placeholder: 'e.g. A CLI tool that converts CSV files to JSON with column filtering and schema validation...'
globals:
  research_depth: 'light'
  approval_mode: 'checkpoint'
  auto_review: false
  subagent_mode: true
  verbosity: 'standard'
  cli_mode: true
tier_presets:
  quick:
    skaileup-research: none
    skaileup-discovery: light
    skaileup-experience: light
    skaileup-blueprint: light
    skaileup-concept-meta: none
  standard:
    skaileup-research: light
    skaileup-discovery: light
    skaileup-experience: medium
    skaileup-blueprint: medium
    skaileup-concept-meta: none
  thorough:
    skaileup-research: medium
    skaileup-discovery: medium
    skaileup-experience: max
    skaileup-blueprint: max
    skaileup-concept-meta: light
modes:
  research:
    enabled: true
    skill: 'skaileup-research'
    triggers:
      - 'overview'
      - 'features'
    parameters:
      topics:
        - 'domain'
        - 'competitors'
        - 'patterns'
  standards:
    enabled: false
entry: 'onboard'
nodes:
  - id: 'onboard'
    type: 'skill'
    position:
      x: -400
      y: 140
    data:
      skill: 'skaileup-onboard'
      label: 'Project Onboarding'
      optional: false
  - id: 'ingest-seeds'
    type: 'skill'
    position:
      x: -200
      y: 140
    data:
      skill: 'skaileup-ingest-seeds'
      label: 'Ingest Seeds'
      optional: true
      skip_when: 'no_seeds_dir'
  - id: 'g-concept'
    type: 'group'
    position:
      x: 0
      y: 0
    style:
      width: 920
      height: 360
      backgroundColor: 'rgba(99,102,241,0.04)'
      border: '1px solid rgba(99,102,241,0.2)'
      borderRadius: '12px'
    data:
      label: 'Concept'
      phase: 'conceptualization'
  - id: 'overview'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 40
      y: 140
    data:
      skill: 'skaileup-overview'
      label: 'Project Brief'
      optional: false
      depth_from: 'skaileup-discovery'
      parameters:
        input_style: 'freeform'
        note: 'Describe CLI commands, flags, and expected output'
  - id: 'journeys'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 280
      y: 60
    data:
      skill: 'skaileup-journeys'
      label: 'User Journeys'
      optional: true
      depth_from: 'skaileup-experience'
      skip_when: "tier.skaileup-experience in ['none', 'light']"
      parameters:
        min_stages:
          - 'hero'
        note: 'Map command-line workflows as journeys'
  - id: 'features'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 280
      y: 200
    data:
      skill: 'skaileup-features'
      label: 'Features'
      optional: false
      depth_from: 'skaileup-experience'
      parameters:
        cli_mode: true
        describe_as_commands: true
  - id: 'techstack'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 280
      y: 320
    data:
      skill: 'skaileup-techstack'
      label: 'Tech Stack'
      optional: false
      depth_from: 'skaileup-blueprint'
      parallel_group: 'identity'
  - id: 'architecture'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 560
      y: 60
    data:
      skill: 'skaileup-architecture'
      label: 'Architecture'
      optional: true
      depth_from: 'skaileup-blueprint'
      extend_when: "artifact.architecture.status == 'seed-partial'"
  - id: 'datamodel'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 560
      y: 200
    data:
      skill: 'skaileup-datamodel'
      label: 'Data Model'
      optional: false
      depth_from: 'skaileup-blueprint'
      extend_when: "artifact.datamodel.status == 'seed-partial'"
      parameters:
        note: 'Config files, storage schemas, output formats'
edges:
  - id: 'e-onboard-ingest'
    source: 'onboard'
    target: 'ingest-seeds'
    type: 'flow'
  - id: 'e-ingest-overview'
    source: 'ingest-seeds'
    target: 'overview'
    type: 'flow'
  - id: 'e-overview-journeys'
    source: 'overview'
    target: 'journeys'
    type: 'optional'
  - id: 'e-overview-features'
    source: 'overview'
    target: 'features'
    type: 'flow'
  - id: 'e-overview-techstack'
    source: 'overview'
    target: 'techstack'
    type: 'parallel'
  - id: 'e-journeys-features'
    source: 'journeys'
    target: 'features'
    type: 'optional'
  - id: 'e-features-architecture'
    source: 'features'
    target: 'architecture'
    type: 'optional'
  - id: 'e-techstack-architecture'
    source: 'techstack'
    target: 'architecture'
    type: 'optional'
  - id: 'e-features-datamodel'
    source: 'features'
    target: 'datamodel'
    type: 'flow'
  - id: 'e-techstack-datamodel'
    source: 'techstack'
    target: 'datamodel'
    type: 'flow'
  - id: 'e-architecture-datamodel'
    source: 'architecture'
    target: 'datamodel'
    type: 'optional'
next_flows:
  - id: 'cli'
    domain: 'skaileup-build'
    label: 'Implement CLI →'
    hint: 'Scaffold the CLI project and implement features with unit and integration tests.'
    artifact_handoff:
      - features
      - datamodel
      - techstack
      - architecture
      - onboarding-decisions
