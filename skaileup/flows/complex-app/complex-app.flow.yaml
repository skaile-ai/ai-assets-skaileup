id: complex-app
version: '2.0.0'
name: 'Complex App'
description: >-
  Multi-product / enterprise. Superset of standard-app plus brand-voice,
  mockup-walkthrough-framework (deferred), non-optional infrastructure,
  project-overview/subsystem-map/integration/review project ops, supervised
  impl-plan, eval-code + audit quality (audit runs every slice — expressed
  via edge ordering since the schema has no loop construct), full
  concept-slice WITH brainstorm, full mockup-feedback cluster (deferred).
  Iteration semantics: cs-brainstorm..q-audit run once per feature; the
  linear graph below shows one iteration. Tier-flow composition rule (per
  SKILL_GRAPH § 6 prose): scope-project -> high-level concept ->
  project-overview -> impl-build setup -> loop: concept-slice (full —
  INCLUDING brainstorm) -> impl-slice (supervised plan) -> impl-quality/audit
  (every slice) -> done. Deferred skills (concept-goals, concept-comparable,
  design-inspiration, mockup-walkthrough-astro/framework, mockup-feedback-*,
  impl-architecture-templates-select) see flows/_meta/deferred_skills.yaml.
meta:
  category: full-stack
  tags:
    - tier
    - complex-app
    - enterprise
    - multi-product
  icon: i-heroicons-building-library
globals:
  research_depth: deep
  approval_mode: checkpoint
  subagent_mode: false
  verbosity: detailed
entry: scope
