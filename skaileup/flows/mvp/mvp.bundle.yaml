name: mvp
description: >-
  Tier bundle for MVP — single-feature, fast prototype. Root tier bundle
  (no inheritance). Lists every skill referenced by flows/mvp.flow.yaml.
  Note: impl-architecture-templates-select is included pending Phase 3
  reconciliation (see flows/_meta/deferred_skills.yaml).
metadata:
  version: '1.0.0'
  tags:
    - bundle
    - tier
    - mvp
    - prototype
  stage: alpha
requires:
  # the flow this bundle provisions a workspace for
  - flow:@skaile-ai/mvp
  # shared reference layer every skill reads (skaileup/contracts/)
  - contract:@skaile-ai/shared-contracts
  - skill:@skaile-ai/skaileup-scope-scope-project
  - skill:@skaile-ai/concept-brief
  - skill:@skaile-ai/product-spec-features
  - skill:@skaile-ai/mockup-walkthrough-text
  - skill:@skaile-ai/impl-architecture-techstack
  - skill:@skaile-ai/impl-architecture-templates-select
  - skill:@skaile-ai/impl-build-scaffold
  - skill:@skaile-ai/impl-plan-plan-vertical
  - skill:@skaile-ai/impl-slice-implement
  - skill:@skaile-ai/impl-slice-commit
  - skill:@skaile-ai/impl-quality-test-unit
