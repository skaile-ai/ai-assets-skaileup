id: skaileup-stepwise
version: '2.0.0'
name: 'SkaileUp Stepwise'
description: >-
  Start-in-the-middle flow — implement features immediately while the concept
  is discovered gradually, feature by feature. A thin foundation is laid once
  (scope -> one-line brief(opt) -> techstack -> datamodel skeleton -> scaffold
  -> foundation -> migrate(opt)), then a single per-feature loop runs the unified
  skaileup-slice block at concept_depth: just-in-time. The slice's concept half
  runs the concept-needs check — it detects which concept information THIS feature
  is missing, surfaces the open questions to the user, and seeds only the minimal
  answers into the canonical _concept/ tree — then its impl half builds the
  feature; the loop repeats for the next one. The concept is never front-loaded:
  it accretes as a by-product of building, only what each feature needs. No new
  skills — delegates the per-feature work to the skaileup-slice flow.
meta:
  category: incremental
  tags:
    - spec-first
    - start-in-the-middle
    - gradual-concept
    - interleaved
    - per-feature
  icon: i-heroicons-sparkles
  onboarding:
    input_style: freeform
    placeholder: >-
      Describe the first feature you want to build. The flow will ask open
      questions to fill in the concept as it goes.
requires:
  # Self-contained install manifest: contracts its skills read + every skill its
  # nodes run + the sub-flows it delegates to. Exact — no inheritance, no extras.
  # The per-feature concept + impl loops are provided by the two slice sub-flows.
  - contract:@skaile-ai/shared-contracts
  - contract:@skaile-ai/conceptualization-contract
  - contract:@skaile-ai/implementation-contract
  - skill:@skaile-ai/skaileup-scope-scope-project
  - skill:@skaile-ai/concept-brief
  - skill:@skaile-ai/impl-architecture-techstack
  - skill:@skaile-ai/impl-architecture-datamodel
  - skill:@skaile-ai/impl-build-scaffold
  - skill:@skaile-ai/impl-build-foundation
  - skill:@skaile-ai/impl-build-migrate
  - flow:@skaile-ai/skaileup-slice
  - skill:@skaile-ai/impl-quality-ready
globals:
  research_depth: light
  approval_mode: checkpoint
  subagent_mode: false
  verbosity: detailed
entry: scope
nodes:
  # --- Thin foundation (laid once) ---
  - id: scope
    type: skill
    position:
      x: 0
      y: 200
    data:
      skill: skaileup-scope-scope-project
      label: 'Scope Project'
      optional: false
      parameters:
        note: 'Asks open questions about shape/size; writes _concept/_meta/scope.yaml'
  - id: brief
    type: skill
    position:
      x: 200
      y: 200
    data:
      skill: concept-brief
      label: 'One-line Brief (opt)'
      optional: true
      parameters:
        note: 'A one-paragraph seed only; the rest of the concept is discovered per feature'
  - id: techstack
    type: skill
    position:
      x: 400
      y: 200
    data:
      skill: impl-architecture-techstack
      label: 'Tech Stack'
      optional: false
      parameters: {}
  - id: datamodel
    type: skill
    position:
      x: 600
      y: 200
    data:
      skill: impl-architecture-datamodel
      label: 'Data Model (skeleton)'
      optional: false
      parameters:
        note: 'Skeleton only; each feature evolves it via impl-slice migrations'
  - id: scaffold
    type: skill
    position:
      x: 800
      y: 200
    data:
      skill: impl-build-scaffold
      label: 'Scaffold'
      optional: false
      parameters: {}
  - id: foundation
    type: skill
    position:
      x: 1000
      y: 200
    data:
      skill: impl-build-foundation
      label: 'Foundation'
      optional: false
      parameters: {}
  - id: migrate
    type: skill
    position:
      x: 1200
      y: 200
    data:
      skill: impl-build-migrate
      label: 'Migrate (opt)'
      optional: true
      parameters: {}
  # --- Per-feature loop: grow concept just-in-time, then build ---
  # One unified slice node at concept_depth: just-in-time. Its concept half runs
  # the concept-needs check (detect missing concept for THIS feature, ask the
  # user, seed the minimum), then its impl half builds. Looped per feature below.
  - id: slice-loop
    type: sub-flow
    position:
      x: 1400
      y: 200
    data:
      flow: skaileup-slice
      domain: slice
      label: 'Feature slice (concept just-in-time, then build)'
      pass_context: true
      parameters:
        concept_depth: just-in-time
  # --- Close-out ---
  - id: q-ready
    type: skill
    position:
      x: 1800
      y: 200
    data:
      skill: impl-quality-ready
      label: 'Release Ready'
      optional: true
      parameters: {}
edges:
  - id: e-scope-brief
    source: scope
    target: brief
    type: optional
  - id: e-brief-techstack
    source: brief
    target: techstack
    type: flow
  - id: e-techstack-datamodel
    source: techstack
    target: datamodel
    type: flow
  - id: e-datamodel-scaffold
    source: datamodel
    target: scaffold
    type: flow
  - id: e-scaffold-foundation
    source: scaffold
    target: foundation
    type: flow
  - id: e-foundation-migrate
    source: foundation
    target: migrate
    type: optional
  - id: e-foundation-slice-loop
    source: foundation
    target: slice-loop
    type: flow
  - id: e-migrate-slice-loop
    source: migrate
    target: slice-loop
    type: optional
  # Per-feature loop: after building a feature, run the slice again for the next
  # one (its concept half discovers that feature's concept just-in-time). Exits
  # to q-ready when the backlog is exhausted.
  - id: e-slice-loop-slice-loop
    source: slice-loop
    target: slice-loop
    type: review-loop
    max_iterations: 50
    exit_condition: >-
      no unbuilt features remain — every feature the user still wants has a
      frozen concept slice (index.md) and a committed impl slice
  - id: e-slice-loop-q-ready
    source: slice-loop
    target: q-ready
    type: flow
