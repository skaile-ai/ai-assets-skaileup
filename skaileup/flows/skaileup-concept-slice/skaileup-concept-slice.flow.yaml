id: skaileup-concept-slice
version: '2.0.0'
name: 'SkaileUp Concept Slice'
description: >-
  Per-feature concept loop: brainstorm -> align -> scope-feature -> design-feature.
  Canonical building block consumed by tier flows (appbuilder-standard, appbuilder-complex)
  via node inlining. Iteration semantics: tier orchestrators run this slice
  once per feature in their feature backlog. Slice flow is standalone-runnable
  for testability of the slice loop.
meta:
  category: concept
  tags:
    - concept-slice
    - per-feature
    - slice
  icon: i-heroicons-light-bulb
requires:
  # Everything installed when this flow is installed: the contract its skills
  # read + every skill its nodes run (flow node order). Self-contained.
  - contract:@skaile-ai/shared-contracts
  - skill:@skaile-ai/concept-slice-brainstorm
  - skill:@skaile-ai/concept-slice-align
  - skill:@skaile-ai/concept-slice-scope-feature
  - skill:@skaile-ai/concept-slice-design-feature
globals:
  research_depth: light
  approval_mode: checkpoint
  subagent_mode: false
  verbosity: standard
entry: c-brainstorm
nodes:
  - id: c-brainstorm
    type: skill
    position:
      x: 0
      y: 200
    data:
      skill: concept-slice-brainstorm
      label: 'Slice: Brainstorm'
      optional: false
      subagent: false
      parameters: {}
  - id: c-align
    type: skill
    position:
      x: 240
      y: 200
    data:
      skill: concept-slice-align
      label: 'Slice: Align'
      optional: false
      subagent: false
      parameters: {}
  - id: c-scope-feature
    type: skill
    position:
      x: 480
      y: 200
    data:
      skill: concept-slice-scope-feature
      label: 'Slice: Scope Feature'
      optional: false
      subagent: false
      parameters: {}
  - id: c-design-feature
    type: skill
    position:
      x: 720
      y: 200
    data:
      skill: concept-slice-design-feature
      label: 'Slice: Design Feature'
      optional: false
      subagent: false
      parameters: {}
edges:
  - id: e-c-brainstorm-c-align
    source: c-brainstorm
    target: c-align
    type: flow
  - id: e-c-align-c-scope-feature
    source: c-align
    target: c-scope-feature
    type: flow
  - id: e-c-scope-feature-c-design-feature
    source: c-scope-feature
    target: c-design-feature
    type: flow
