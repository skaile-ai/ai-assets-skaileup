name: simple-app
description: >-
  Tier bundle for simple-app — single-user, ≤5 features, full impl-slice loop.
  Inherits mvp; adds brand-visual, journeys, screens, static-html walkthrough,
  isolated-html components, datamodel, full impl-build setup, impl-plan-align,
  impl-slice-test/recap, e2e quality.
  Note: simple-app's flow does NOT use mockup-walkthrough-text (mvp's mockup
  variant); installing it as part of the inheritance chain is a no-op (skill
  is available; just not invoked by simple-app.flow.yaml).
metadata:
  version: '1.0.0'
  tags:
    - bundle
    - tier
    - simple-app
    - small
  stage: alpha
requires:
  - flow:@skaile-ai/simple-app
  - bundle:@skaile-ai/mvp
  # contract added by impl-build-docs (shared-contracts inherited from mvp):
  - contract:@skaile-ai/implementation-contract
  # delta vs mvp (computed from flows):
  - skill:@skaile-ai/design-brand-visual
  - skill:@skaile-ai/experience-journeys
  - skill:@skaile-ai/experience-screens
  - skill:@skaile-ai/mockup-walkthrough-static-html
  - skill:@skaile-ai/mockup-component-isolated-html
  - skill:@skaile-ai/impl-architecture-datamodel
  - skill:@skaile-ai/impl-build-foundation
  - skill:@skaile-ai/impl-build-migrate
  - skill:@skaile-ai/impl-build-seed
  - skill:@skaile-ai/impl-build-docs
  - skill:@skaile-ai/impl-plan-align
  - skill:@skaile-ai/impl-slice-test
  - skill:@skaile-ai/impl-slice-recap
  - skill:@skaile-ai/impl-quality-test-e2e
