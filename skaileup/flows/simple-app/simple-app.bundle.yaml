name: simple-app
description: >-
  Tier bundle for simple-app — single-user, ≤5 features, full impl-slice loop.
  Inherits mvp; adds brand-visual, journeys, screens, static-html walkthrough,
  isolated-html components, datamodel, full impl-build setup, impl-plan-align,
  impl-slice-test/recap, e2e quality.
  Note: simple-app's flow does NOT use mockup-walkthrough-text (mvp's mockup
  variant); installing it as part of the inheritance chain is a no-op (skill
  is available; just not invoked by simple-app.flow.yaml).
metadata:
  version: '1.0.0'
  tags:
    - bundle
    - tier
    - simple-app
    - small
  stage: alpha
requires:
  - bundle:mvp@skaile-ai
  # delta vs mvp (computed from flows):
  - skill:design-brand-visual@skaile-ai
  - skill:experience-journeys@skaile-ai
  - skill:experience-screens@skaile-ai
  - skill:mockup-walkthrough-static-html@skaile-ai
  - skill:mockup-component-isolated-html@skaile-ai
  - skill:impl-architecture-datamodel@skaile-ai
  - skill:impl-build-foundation@skaile-ai
  - skill:impl-build-migrate@skaile-ai
  - skill:impl-build-seed@skaile-ai
  - skill:impl-build-docs@skaile-ai
  - skill:impl-plan-align@skaile-ai
  - skill:impl-slice-test@skaile-ai
  - skill:impl-slice-recap@skaile-ai
  - skill:impl-quality-test-e2e@skaile-ai
