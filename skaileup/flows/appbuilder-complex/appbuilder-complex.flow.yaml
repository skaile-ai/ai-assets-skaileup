id: appbuilder-complex
version: '2.0.0'
name: 'Complex App'
description: >-
  Multi-product / enterprise. Superset of appbuilder-standard plus brand-voice,
  mockup-walkthrough-framework, non-optional infrastructure,
  project-overview/subsystem-map/integration/review project ops, eval-code +
  audit quality (audit runs every slice — expressed via edge ordering since the
  schema has no loop construct), full mockup-feedback cluster. Both per-feature
  loops are delegated to sub-flows: the concept-slice flow and the (full)
  impl-slice flow — supervised dispatch now runs inside the impl-slice flow
  itself (every slice, every tier), so it is no longer a complex-only node.
  eval-code + audit run after each slice loop. Iteration semantics: the
  per-feature loops + q-eval-code/q-audit run once per feature; the linear
  graph below shows one iteration. Composition: scope-project -> high-level
  concept -> project-overview -> impl-build setup -> loop: [sub-flow]
  concept-slice -> [sub-flow] impl-slice -> impl-quality/audit (every slice)
  -> done.
meta:
  category: full-stack
  tags:
    - tier
    - appbuilder-complex
    - enterprise
    - multi-product
  icon: i-heroicons-building-library
requires:
  # Everything installed when this flow is installed: the contracts its skills
  # read + every skill its nodes run (flow node order). Self-contained — no
  # inheritance, no extras.
  - contract:@skaile-ai/shared-contracts
  - contract:@skaile-ai/implementation-contract
  - contract:@skaile-ai/meta-concept-contract
  - skill:@skaile-ai/skaileup-scope-scope-project
  - skill:@skaile-ai/concept-brief
  - skill:@skaile-ai/concept-goals
  - skill:@skaile-ai/concept-comparable
  - skill:@skaile-ai/design-brand-visual
  - skill:@skaile-ai/design-brand-voice
  - skill:@skaile-ai/design-inspiration
  - skill:@skaile-ai/experience-journeys
  - skill:@skaile-ai/experience-behaviors
  - skill:@skaile-ai/product-spec-features
  - skill:@skaile-ai/experience-screens
  - skill:@skaile-ai/experience-components
  - skill:@skaile-ai/mockup-walkthrough-astro
  - skill:@skaile-ai/mockup-walkthrough-framework
  - skill:@skaile-ai/mockup-walkthrough-static-html
  - skill:@skaile-ai/mockup-component-storybook
  - skill:@skaile-ai/mockup-feedback-annotate
  - skill:@skaile-ai/mockup-feedback-triage
  - skill:@skaile-ai/mockup-feedback-patch
  - skill:@skaile-ai/mockup-feedback-apply
  - skill:@skaile-ai/ops-project-overview
  - skill:@skaile-ai/ops-project-subsystem-map
  - skill:@skaile-ai/ops-project-integration
  - skill:@skaile-ai/ops-project-review
  - skill:@skaile-ai/impl-architecture-techstack
  - skill:@skaile-ai/impl-architecture-templates-select
  - skill:@skaile-ai/impl-architecture-system
  - skill:@skaile-ai/impl-architecture-datamodel
  - skill:@skaile-ai/impl-build-scaffold
  - skill:@skaile-ai/impl-build-foundation
  - skill:@skaile-ai/impl-build-infrastructure
  - skill:@skaile-ai/impl-build-migrate
  - skill:@skaile-ai/impl-build-seed
  - skill:@skaile-ai/impl-build-docs
  # Per-feature loops delegated to sub-flows (their own manifests provide the
  # loop skills, including impl-plan-supervised, which now runs inside the
  # impl-slice flow on every slice). eval-code + audit stay — complex-only,
  # run after each slice loop.
  - flow:@skaile-ai/concept-slice
  - flow:@skaile-ai/impl-slice
  - skill:@skaile-ai/impl-quality-eval-code
  - skill:@skaile-ai/impl-quality-audit
  - skill:@skaile-ai/impl-quality-test-unit
  - skill:@skaile-ai/impl-quality-test-integration
  - skill:@skaile-ai/impl-quality-test-e2e
  - skill:@skaile-ai/impl-quality-ready
  - skill:@skaile-ai/ops-review
  - skill:@skaile-ai/ops-sync
globals:
  research_depth: deep
  approval_mode: checkpoint
  subagent_mode: false
  verbosity: detailed
entry: scope
