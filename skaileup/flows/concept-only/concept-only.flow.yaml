id: concept-only
version: '2.0.0'
name: 'Concept Only'
description: >-
  Produces a complete concept document package without implementation — for
  planning, documentation, or handing off to a development team. Full concept
  pass: grounding (onboard -> seeds -> research) -> discovery (brief, goals,
  comparable) -> design (brand-visual, brand-voice, inspiration) -> experience
  (journeys, features, behaviors, screens, screens-technical, components) ->
  architecture (techstack, system, datamodel) -> optional text walkthrough
  mockup -> concept review. No build, no impl-slice loop. Replaces the legacy
  concept-only + prototype flows and is the canonical home for the
  concept-grounding-* skills.
meta:
  category: concept
  tags:
    - variant
    - concept
    - documentation
    - handoff
    - no-code
  icon: i-heroicons-document-text
  onboarding:
    input_style: structured
    fields:
      - app_name
      - problem
      - audience
      - notes
requires:
  # Self-contained install manifest: contracts its skills read + every skill its
  # nodes run (flow node order). Exact — no inheritance, no extras.
  - contract:@skaile-ai/shared-contracts
  - contract:@skaile-ai/conceptualization-contract
  - contract:@skaile-ai/meta-concept-contract
  - skill:@skaile-ai/skaileup-scope-scope-project
  - skill:@skaile-ai/concept-grounding-onboard
  - skill:@skaile-ai/concept-grounding-seeds
  - skill:@skaile-ai/concept-grounding-research
  - skill:@skaile-ai/concept-brief
  - skill:@skaile-ai/concept-goals
  - skill:@skaile-ai/concept-comparable
  - skill:@skaile-ai/design-brand-visual
  - skill:@skaile-ai/design-brand-voice
  - skill:@skaile-ai/design-inspiration
  - skill:@skaile-ai/experience-journeys
  - skill:@skaile-ai/product-spec-features
  - skill:@skaile-ai/experience-behaviors
  - skill:@skaile-ai/experience-screens
  - skill:@skaile-ai/experience-screens-technical
  - skill:@skaile-ai/experience-components
  - skill:@skaile-ai/impl-architecture-techstack
  - skill:@skaile-ai/impl-architecture-system
  - skill:@skaile-ai/impl-architecture-datamodel
  - skill:@skaile-ai/mockup-walkthrough-text
  - skill:@skaile-ai/ops-review
globals:
  research_depth: moderate
  approval_mode: checkpoint
  subagent_mode: true
  verbosity: detailed
entry: scope
