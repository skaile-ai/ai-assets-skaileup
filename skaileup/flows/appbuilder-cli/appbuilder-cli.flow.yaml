id: appbuilder-cli
version: '2.0.0'
name: 'Appbuilder CLI'
description: >-
  Command-line tool — no UI shell, no brand, no journeys/screens, no mockups,
  no E2E. End-to-end: linear CLI concept (scope -> brief -> features-as-commands
  -> techstack -> templates -> datamodel) then build setup (scaffold ->
  foundation headless -> migrate/seed -> docs) then delegates per-feature
  work to the impl-slice sub-flow (full loop: brainstorm -> align ->
  plan-vertical -> git-prepare -> implement -> implement-page -> test ->
  recap -> refactor -> commit -> git-finish), run once per feature.
  Quality: unit + integration (no E2E). Replaces the legacy split cli-concept
  + cli flows with one conformant, self-contained tier.
meta:
  category: cli
  tags:
    - variant
    - cli
    - no-ui
    - headless
  icon: i-heroicons-command-line
requires:
  # Self-contained install manifest: contracts its skills read + every skill its
  # nodes run (flow node order). Exact — no inheritance, no extras.
  - contract:@skaile-ai/shared-contracts
  - contract:@skaile-ai/implementation-contract
  - skill:@skaile-ai/skaileup-scope-scope-project
  - skill:@skaile-ai/concept-brief
  - skill:@skaile-ai/product-spec-features
  - skill:@skaile-ai/impl-architecture-techstack
  - skill:@skaile-ai/impl-architecture-templates-select
  - skill:@skaile-ai/impl-architecture-datamodel
  - skill:@skaile-ai/impl-build-scaffold
  - skill:@skaile-ai/impl-build-foundation
  - skill:@skaile-ai/impl-build-migrate
  - skill:@skaile-ai/impl-build-seed
  - skill:@skaile-ai/impl-build-docs
  - flow:@skaile-ai/skaileup-impl-slice
  - skill:@skaile-ai/impl-quality-test-unit
  - skill:@skaile-ai/impl-quality-test-integration
globals:
  research_depth: light
  approval_mode: checkpoint
  subagent_mode: true
  verbosity: standard
entry: scope
nodes:
  # --- Scope ---
  - id: scope
    type: skill
    position:
      x: 0
      y: 200
    data:
      skill: skaileup-scope-scope-project
      label: 'Scope Project'
      optional: false
      parameters: {}
  # --- Linear CLI concept (no UI) ---
  - id: brief
    type: skill
    position:
      x: 200
      y: 200
    data:
      skill: concept-brief
      label: 'Concept Brief'
      optional: false
      parameters:
        note: 'Describe CLI commands, flags, and expected output'
  - id: features
    type: skill
    position:
      x: 400
      y: 200
    data:
      skill: product-spec-features
      label: 'Features (commands)'
      optional: false
      parameters:
        cli_mode: true
        describe_as_commands: true
  - id: techstack
    type: skill
    position:
      x: 600
      y: 200
    data:
      skill: impl-architecture-techstack
      label: 'Tech Stack'
      optional: false
      parameters: {}
  - id: templates
    type: skill
    position:
      x: 800
      y: 200
    data:
      skill: impl-architecture-templates-select
      label: 'Architecture Templates'
      optional: true
      parameters: {}
  - id: datamodel
    type: skill
    position:
      x: 1000
      y: 200
    data:
      skill: impl-architecture-datamodel
      label: 'Data Model'
      optional: false
      parameters:
        note: 'Config files, storage schemas, output formats'
  # --- Build (headless) ---
  - id: scaffold
    type: skill
    position:
      x: 1200
      y: 200
    data:
      skill: impl-build-scaffold
      label: 'Scaffold'
      optional: false
      parameters:
        project_type: cli
  - id: foundation
    type: skill
    position:
      x: 1400
      y: 200
    data:
      skill: impl-build-foundation
      label: 'Foundation'
      optional: false
      parameters:
        skip_ui_shell: true
  - id: migrate
    type: skill
    position:
      x: 1600
      y: 120
    data:
      skill: impl-build-migrate
      label: 'Migrate'
      optional: true
      parameters: {}
  - id: seed
    type: skill
    position:
      x: 1600
      y: 280
    data:
      skill: impl-build-seed
      label: 'Seed'
      optional: true
      parameters: {}
  - id: docs
    type: skill
    position:
      x: 1800
      y: 200
    data:
      skill: impl-build-docs
      label: 'Build Docs'
      optional: false
      parameters: {}
  # --- Per-feature impl-slice loop (delegated to the impl-slice flow) ---
  - id: impl-slice-loop
    type: sub-flow
    position:
      x: 2000
      y: 200
    data:
      flow: skaileup-impl-slice
      domain: impl-slice
      label: 'Per-feature impl-slice loop'
      pass_context: true
  # --- Quality (unit + integration, no E2E) ---
  - id: q-test-unit
    type: skill
    position:
      x: 3200
      y: 120
    data:
      skill: impl-quality-test-unit
      label: 'Unit Tests'
      optional: false
      parameters: {}
  - id: q-test-integration
    type: skill
    position:
      x: 3200
      y: 280
    data:
      skill: impl-quality-test-integration
      label: 'Integration Tests'
      optional: false
      parameters: {}
edges:
  - id: e-scope-brief
    source: scope
    target: brief
    type: flow
  - id: e-brief-features
    source: brief
    target: features
    type: flow
  - id: e-features-techstack
    source: features
    target: techstack
    type: flow
  - id: e-techstack-templates
    source: techstack
    target: templates
    type: optional
  - id: e-templates-datamodel
    source: templates
    target: datamodel
    type: flow
  - id: e-datamodel-scaffold
    source: datamodel
    target: scaffold
    type: flow
  - id: e-scaffold-foundation
    source: scaffold
    target: foundation
    type: flow
  - id: e-foundation-migrate
    source: foundation
    target: migrate
    type: optional
  - id: e-migrate-seed
    source: migrate
    target: seed
    type: optional
  - id: e-foundation-docs
    source: foundation
    target: docs
    type: flow
  - id: e-docs-impl-slice-loop
    source: docs
    target: impl-slice-loop
    type: flow
  - id: e-impl-slice-loop-q-test-unit
    source: impl-slice-loop
    target: q-test-unit
    type: flow
  - id: e-impl-slice-loop-q-test-integration
    source: impl-slice-loop
    target: q-test-integration
    type: flow
