id: 'prototype'
version: '2.0.0'
name: 'Prototype Implementation'
description: 'Minimal implementation pass for rapid prototypes. Scaffold, implement features (no strict TDD), light E2E smoke test. Optimized for speed and user testing — not production readiness.'
metadata:
  tags:
    - 'prototype'
    - 'fast'
    - 'validation'
    - 'minimal'
  stage: 'stable'
  icon: 'i-heroicons-cursor-arrow-ripple'
  category: 'prototype'
globals:
  research_depth: 'skip'
  approval_mode: 'auto_approve'
  auto_review: false
  subagent_mode: false
  verbosity: 'brief'
modes:
  research:
    enabled: false
  standards:
    enabled: false
artifact_handoff:
  from_concept:
    - features
    - screens
    - techstack
    - onboarding-decisions
entry: 'scaffold'
nodes:
  - id: 'g-implement'
    type: 'group'
    position:
      x: 0
      y: 0
    style:
      width: 760
      height: 280
      backgroundColor: 'rgba(16,185,129,0.04)'
      border: '1px solid rgba(16,185,129,0.2)'
      borderRadius: '12px'
    data:
      label: 'Implementation'
      phase: 'implementation'
  - id: 'scaffold'
    type: 'skill'
    parentNode: 'g-implement'
    position:
      x: 40
      y: 120
    data:
      skill: 'impl-build-scaffold'
      label: 'Scaffold'
      optional: false
      parameters:
        package_manager: 'bun'
  - id: 'implement-feature'
    type: 'skill'
    parentNode: 'g-implement'
    position:
      x: 280
      y: 120
    data:
      skill: 'impl-build-implement-feature'
      label: 'Feature'
      optional: false
      subagent: true
      parameters:
        tdd: false
        note: 'Prototype pass — focus on working UI, skip test infrastructure'
  - id: 'e2e'
    type: 'skill'
    parentNode: 'g-implement'
    position:
      x: 520
      y: 120
    data:
      skill: 'impl-quality-test-e2e'
      label: 'Smoke Test'
      optional: true
      parameters:
        scope: 'smoke'
        note: 'Happy-path journey smoke test only'
edges:
  - id: 'e-scaffold-feature'
    source: 'scaffold'
    target: 'implement-feature'
    type: 'flow'
  - id: 'e-feature-e2e'
    source: 'implement-feature'
    target: 'e2e'
    type: 'optional'
next_flows:
  - id: 'standard'
    domain: 'impl-build'
    label: 'Harden →'
    hint: 'Upgrade from prototype to production — foundation, TDD, full test suite, verify.'
