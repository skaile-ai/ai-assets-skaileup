id: 'prototype'
version: '2.0.0'
name: 'prototype'
description: 'Concept + interactive mockups only. No data model, no implementation. Fastest path to a clickable prototype for user validation.'
metadata:
  tags:
    - 'prototype'
    - 'validation'
    - 'no-code'
    - 'fast'
  stage: 'stable'
  icon: 'i-heroicons-cursor-arrow-ripple'
  category: 'prototype'
  onboarding:
    input_style: 'freeform'
    placeholder: 'e.g. Restaurant reservation & waitlist manager for small venues...'
globals:
  research_depth: 'light'
  approval_mode: 'checkpoint'
  auto_review: false
  subagent_mode: false
  verbosity: 'brief'
tier_presets:
  quick:
    concept-grounding-research: none
    design: light
    experience: light
    mockup-walkthrough: light
    mockup-component-storybook: none
    impl-architecture: none
    ops: none
  standard:
    concept-grounding-research: light
    design: medium
    experience: medium
    mockup-walkthrough: medium
    mockup-component-storybook: none
    impl-architecture: none
    ops: none
  thorough:
    concept-grounding-research: medium
    design: max
    experience: max
    mockup-walkthrough: medium
    mockup-component-storybook: max
    impl-architecture: none
    ops: none
modes:
  research:
    enabled: true
    skill: 'concept-grounding-research'
    triggers:
      - 'overview'
      - 'brand-visual'
    parameters:
      topics:
        - 'competitors'
        - 'design_inspiration'
        - 'colors_fonts'
  standards:
    enabled: false
entry: 'onboard'
nodes:
  - id: 'onboard'
    type: 'skill'
    position:
      x: -400
      y: 160
    data:
      skill: 'concept-grounding-onboard'
      label: 'Project Onboarding'
      optional: false
  - id: 'ingest-seeds'
    type: 'skill'
    position:
      x: -200
      y: 160
    data:
      skill: 'concept-grounding-seeds'
      label: 'Ingest Seeds'
      optional: true
      skip_when: 'no_seeds_dir'
  - id: 'g-concept'
    type: 'group'
    position:
      x: 0
      y: 0
    style:
      width: 1400
      height: 400
      backgroundColor: 'rgba(99,102,241,0.04)'
      border: '1px solid rgba(99,102,241,0.2)'
      borderRadius: '12px'
    data:
      label: 'Concept'
      phase: 'conceptualization'
  - id: 'overview'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 40
      y: 160
    data:
      skill: 'concept-brief'
      label: 'Project Brief'
      optional: false
      depth_from: 'design'
      parameters:
        input_style: 'freeform'
  - id: 'journeys'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 280
      y: 60
    data:
      skill: 'experience-journeys'
      label: 'User Journeys'
      optional: true
      depth_from: 'experience'
      skip_when: "tier.experience in ['none', 'light']"
      parameters:
        hero_approval_required: true
        min_stages:
          - 'hero'
  - id: 'brand-visual'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 280
      y: 200
    data:
      skill: 'design-brand-visual'
      label: 'Brand Visual'
      optional: false
      depth_from: 'design'
      skip_when: "tier.design in ['none', 'light']"
      parallel_group: 'identity'
  - id: 'techstack'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 280
      y: 320
    data:
      skill: 'impl-architecture-techstack'
      label: 'Tech Stack'
      optional: false
      depth_from: 'impl-architecture'
      parallel_group: 'identity'
  - id: 'features'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 560
      y: 200
    data:
      skill: 'product-spec-features'
      label: 'Features'
      optional: false
      depth_from: 'experience'
  - id: 'screens'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 840
      y: 200
    data:
      skill: 'experience-screens'
      label: 'Screens'
      optional: false
      depth_from: 'experience'
  - id: 'route-prototype'
    type: 'router'
    parentNode: 'g-concept'
    position:
      x: 1120
      y: 200
    data:
      label: 'Prototype Router'
      routes:
        - condition: "tier.mockup-component-storybook in ['medium', 'max']"
          target: 'storybook'
        - condition: "tier.mockup-walkthrough in ['light', 'medium', 'max']"
          target: 'mock'
        - condition: 'default'
          target: null
  - id: 'mock'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 1280
      y: 240
    data:
      skill: 'mockup-walkthrough-text'
      label: 'Mockups'
      optional: false
      depth_from: 'mockup-walkthrough'
      skip_when: "tier.mockup-walkthrough == 'none'"
      parameters:
        framework: 'alpine'
        include_seed_data: true
        include_interactions: true
  - id: 'storybook'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 1280
      y: 80
    data:
      skill: 'mockup-component-storybook'
      label: 'Storybook'
      optional: true
      depth_from: 'mockup-component-storybook'
      skip_when: "tier.mockup-component-storybook == 'none'"
edges:
  - id: 'e-onboard-ingest'
    source: 'onboard'
    target: 'ingest-seeds'
    type: 'flow'
  - id: 'e-ingest-overview'
    source: 'ingest-seeds'
    target: 'overview'
    type: 'flow'
  - id: 'e-overview-journeys'
    source: 'overview'
    target: 'journeys'
    type: 'optional'
  - id: 'e-overview-brand'
    source: 'overview'
    target: 'brand-visual'
    type: 'parallel'
  - id: 'e-overview-techstack'
    source: 'overview'
    target: 'techstack'
    type: 'parallel'
  - id: 'e-journeys-features'
    source: 'journeys'
    target: 'features'
    type: 'optional'
  - id: 'e-overview-features'
    source: 'overview'
    target: 'features'
    type: 'flow'
  - id: 'e-features-screens'
    source: 'features'
    target: 'screens'
    type: 'flow'
  - id: 'e-brand-screens'
    source: 'brand-visual'
    target: 'screens'
    type: 'flow'
  - id: 'e-techstack-screens'
    source: 'techstack'
    target: 'screens'
    type: 'flow'
  - id: 'e-screens-route-prototype'
    source: 'screens'
    target: 'route-prototype'
    type: 'flow'
next_flows:
  - id: 'prototype'
    domain: 'impl-build'
    label: 'Build Prototype →'
    hint: 'Scaffold and run a minimal implementation pass — fast path for user testing.'
    artifact_handoff:
      - features
      - screens
      - techstack
      - onboarding-decisions
  - id: 'standard'
    domain: 'impl-build'
    label: 'Full Implement →'
    hint: 'Continue to production-grade implementation after validating the prototype concept.'
    artifact_handoff:
      - features
      - screens
      - techstack
      - onboarding-decisions
