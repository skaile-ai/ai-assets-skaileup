id: 'concept-only'
version: '2.0.0'
name: 'Concept Only'
description: 'Produces a complete concept document package without implementation. For planning, documentation, or handing off to a development team.'
metadata:
  tags:
    - 'concept'
    - 'documentation'
    - 'planning'
    - 'handoff'
    - 'no-code'
  stage: 'stable'
  icon: 'i-heroicons-document-text'
  category: 'concept'
  onboarding:
    input_style: 'structured'
    fields:
      - 'app_name'
      - 'problem'
      - 'audience'
      - 'notes'
globals:
  research_depth: 'moderate'
  approval_mode: 'checkpoint'
  auto_review: true
  subagent_mode: true
  verbosity: 'detailed'
tier_presets:
  quick:
    concept-grounding-research: light
    design: light
    experience: light
    mockup-walkthrough: none
    mockup-component-storybook: none
    impl-architecture: light
    ops: none
  standard:
    concept-grounding-research: medium
    design: medium
    experience: medium
    mockup-walkthrough: light
    mockup-component-storybook: none
    impl-architecture: medium
    ops: light
  thorough:
    concept-grounding-research: max
    design: max
    experience: max
    mockup-walkthrough: medium
    mockup-component-storybook: max
    impl-architecture: max
    ops: medium
modes:
  research:
    enabled: true
    skill: 'concept-grounding-research'
    triggers:
      - 'overview'
      - 'features'
      - 'brand-visual'
      - 'datamodel'
      - 'screens'
    parameters:
      topics:
        - 'domain'
        - 'competitors'
        - 'audiences'
        - 'design-inspiration'
        - 'patterns'
  standards:
    enabled: false
entry: 'onboard'
nodes:
  - id: 'onboard'
    type: 'skill'
    position:
      x: -400
      y: 200
    data:
      skill: 'concept-grounding-onboard'
      label: 'Project Onboarding'
      optional: false
  - id: 'ingest-seeds'
    type: 'skill'
    position:
      x: -200
      y: 200
    data:
      skill: 'concept-grounding-seeds'
      label: 'Ingest Seeds'
      optional: true
      skip_when: 'no_seeds_dir'
  - id: 'research'
    type: 'skill'
    position:
      x: -400
      y: 400
    data:
      skill: 'concept-grounding-research'
      label: 'Domain Research'
      optional: true
      depth_from: 'concept-grounding-research'
      skip_when: "tier.concept-grounding-research == 'none'"
      mode: parallel
  - id: 'g-concept'
    type: 'group'
    position:
      x: 0
      y: 0
    style:
      width: 1600
      height: 480
      backgroundColor: 'rgba(99,102,241,0.04)'
      border: '1px solid rgba(99,102,241,0.2)'
      borderRadius: '12px'
    data:
      label: 'Concept'
      phase: 'conceptualization'
  - id: 'overview'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 40
      y: 200
    data:
      skill: 'concept-brief'
      label: 'Project Brief'
      optional: false
      depth_from: 'design'
  - id: 'journeys'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 280
      y: 80
    data:
      skill: 'experience-journeys'
      label: 'User Journeys'
      optional: false
      depth_from: 'experience'
      skip_when: "tier.experience in ['none', 'light']"
      parameters:
        hero_approval_required: true
  - id: 'brand-visual'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 280
      y: 240
    data:
      skill: 'design-brand-visual'
      label: 'Brand Visual'
      optional: false
      depth_from: 'design'
      skip_when: "tier.design in ['none', 'light']"
      parallel_group: 'identity'
  - id: 'techstack'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 280
      y: 380
    data:
      skill: 'impl-architecture-techstack'
      label: 'Tech Stack'
      optional: false
      depth_from: 'impl-architecture'
      parallel_group: 'identity'
  - id: 'features'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 560
      y: 200
    data:
      skill: 'product-spec-features'
      label: 'Features'
      optional: false
      depth_from: 'experience'
      subagent: true
  - id: 'brand-behavioral'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 560
      y: 80
    data:
      skill: 'design-brand-voice'
      label: 'Brand Behavioral'
      optional: true
      depth_from: 'design'
      skip_when:
        tier_is: none
  - id: 'behaviors'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 560
      y: 340
    data:
      skill: 'experience-behaviors'
      label: 'Behaviors'
      optional: true
      depth_from: 'experience'
      skip_when:
        tier_is: none
  - id: 'architecture'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 840
      y: 80
    data:
      skill: 'impl-architecture-system'
      label: 'Architecture'
      optional: false
      depth_from: 'impl-architecture'
      subagent: true
      extend_when: "artifact.architecture.status == 'seed-partial'"
  - id: 'datamodel'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 840
      y: 240
    data:
      skill: 'impl-architecture-datamodel'
      label: 'Data Model'
      optional: false
      depth_from: 'impl-architecture'
      subagent: true
      extend_when: "artifact.datamodel.status == 'seed-partial'"
  - id: 'screens'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 1120
      y: 200
    data:
      skill: 'experience-screens'
      label: 'Screens'
      optional: false
      depth_from: 'experience'
      subagent: true
  - id: 'components'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 1120
      y: 60
    data:
      skill: 'experience-components'
      label: 'Components'
      optional: true
      depth_from: 'experience'
      skip_when:
        tier_is: none
  - id: 'route-prototype'
    type: 'router'
    parentNode: 'g-concept'
    position:
      x: 1360
      y: 200
    data:
      label: 'Prototype Router'
      routes:
        - condition: "tier.mockup-component-storybook in ['medium', 'max']"
          target: 'storybook'
        - condition: "tier.mockup-walkthrough in ['light', 'medium', 'max']"
          target: 'mock'
        - condition: 'default'
          target: null
  - id: 'storybook'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 1360
      y: 60
    data:
      skill: 'mockup-component-storybook'
      label: 'Storybook'
      optional: true
      depth_from: 'mockup-component-storybook'
      skip_when:
        tier_is: none
  - id: 'mock'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 1360
      y: 340
    data:
      skill: 'mockup-walkthrough-text'
      label: 'Mockups'
      optional: true
      depth_from: 'mockup-walkthrough'
      skip_when:
        tier_is: none
      parameters:
        framework: 'vue'
  - id: 'review'
    type: 'skill'
    parentNode: 'g-concept'
    position:
      x: 1560
      y: 200
    data:
      skill: 'ops-review'
      label: 'Concept Review'
      optional: true
      depth_from: 'ops'
      skip_when: "tier.ops == 'none'"
edges:
  - id: 'e-onboard-ingest'
    source: 'onboard'
    target: 'ingest-seeds'
    type: 'flow'
  - id: 'e-onboard-research'
    source: 'onboard'
    target: 'research'
    type: 'parallel'
  - id: 'e-ingest-overview'
    source: 'ingest-seeds'
    target: 'overview'
    type: 'flow'
  - id: 'e-overview-journeys'
    source: 'overview'
    target: 'journeys'
    type: 'flow'
  - id: 'e-overview-brand'
    source: 'overview'
    target: 'brand-visual'
    type: 'parallel'
  - id: 'e-overview-techstack'
    source: 'overview'
    target: 'techstack'
    type: 'parallel'
  - id: 'e-journeys-features'
    source: 'journeys'
    target: 'features'
    type: 'flow'
  - id: 'e-brand-behavioral'
    source: 'brand-visual'
    target: 'brand-behavioral'
    type: 'optional'
  - id: 'e-features-behaviors'
    source: 'features'
    target: 'behaviors'
    type: 'optional'
  - id: 'e-features-architecture'
    source: 'features'
    target: 'architecture'
    type: 'flow'
  - id: 'e-techstack-architecture'
    source: 'techstack'
    target: 'architecture'
    type: 'flow'
  - id: 'e-features-datamodel'
    source: 'features'
    target: 'datamodel'
    type: 'flow'
  - id: 'e-techstack-datamodel'
    source: 'techstack'
    target: 'datamodel'
    type: 'flow'
  - id: 'e-architecture-datamodel'
    source: 'architecture'
    target: 'datamodel'
    type: 'flow'
  - id: 'e-behaviors-datamodel'
    source: 'behaviors'
    target: 'datamodel'
    type: 'optional'
  - id: 'e-datamodel-screens'
    source: 'datamodel'
    target: 'screens'
    type: 'flow'
  - id: 'e-brand-screens'
    source: 'brand-visual'
    target: 'screens'
    type: 'flow'
  - id: 'e-techstack-screens'
    source: 'techstack'
    target: 'screens'
    type: 'flow'
  - id: 'e-screens-components'
    source: 'screens'
    target: 'components'
    type: 'optional'
  - id: 'e-screens-route-prototype'
    source: 'screens'
    target: 'route-prototype'
    type: 'flow'
  - id: 'e-datamodel-review'
    source: 'datamodel'
    target: 'review'
    type: 'flow'
  - id: 'e-route-prototype-review'
    source: 'route-prototype'
    target: 'review'
    type: 'flow'
  - id: 'e-review-loop'
    source: 'review'
    target: 'overview'
    type: 'review-loop'
    max_iterations: 2
    exit_condition: 'review.score >= 0.8'
    on_exit_fail: 'pause-for-human'
next_flows:
  - id: 'standard'
    domain: 'impl-build'
    label: 'Implement →'
    hint: 'Scaffold, implement features with TDD, run tests, and verify.'
    artifact_handoff:
      - features
      - screens
      - datamodel
      - techstack
      - architecture
      - onboarding-decisions
  - id: 'full'
    domain: 'impl-build'
    label: 'Full Production →'
    hint: 'Readiness gate, design pass, comprehensive test suite, verify.'
