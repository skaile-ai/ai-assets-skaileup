spec_version: '0.1.0'
name: 'skaileup-conceptualize'
version: '1.0.0'
description: 'Concept pipeline orchestrator — runs the full conceptualization pipeline (Discovery → Experience → Blueprint) with checkpoint approvals, PLANS.md tracking, and auto-review mode. Wraps the CF and Saxe orchestrator skill variants.'
extends: '../../../ai-asset-management/agents/skaile/agent.yaml'
model:
  preferred: 'claude-opus-4-6'
  fallback:
    - 'claude-sonnet-4-6'
  constraints:
    temperature: 0.3
    max_tokens: 8192
delegation:
  mode: 'explicit'
runtime:
  max_turns: 100
  timeout: 1800
author: 'skaile'
license: 'MIT'
tags:
  - 'orchestrator'
  - 'concept-pipeline'
  - 'discovery'
  - 'experience'
  - 'blueprint'
  - 'plans'
metadata:
  domain: 'skaileup-conceptualization'
  skill_merged: 'skills/skaileup-orchestrator/SKILL.md'
  phases: 'Discovery, Experience, Blueprint'
  complexity_tiers: 'small, standard, complex'
  produces: '_concept/ artifacts, PLANS.md, approval snapshots, LEARNINGS.md'
  checkpoint_protocol: 'validate_skill_rules → approve/auto-approve → snapshot → log_learnings'
  resume: 'reads PLANS.md if present — resumes from last incomplete step'
  stage: 'alpha'
