id: onboarding-decisions-v1
description: "Collected decisions from onboarding dialog with confidence levels. Stored at _grounding/onboarding/decisions.yaml."
version: 1
type: object
additionalProperties:
  type: object
  description: "A decision category (techstack, brand, architecture, auth, etc.)"
  properties:
    confidence:
      type: string
      enum: [locked, preferred, open]
      description: "locked = non-negotiable, preferred = suggest if fits, open = decide for me"
  additionalProperties: true

example:
  techstack:
    framework: "Nuxt 4"
    orm: "Drizzle"
    database: "SQLite"
    ui: "Nuxt UI"
    confidence: locked
  brand:
    has_existing: true
    seed_from: "_seeds/brand-guidelines.json"
    confidence: preferred
  architecture:
    pattern: "hexagonal"
    confidence: preferred
  auth:
    provider: "self-hosted"
    confidence: open
