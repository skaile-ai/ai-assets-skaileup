id: audiences-v1
description: "Target audience persona profiles produced by skailup-research. Stored at _grounding/research/audiences.md."
version: 1
type: object
required: [personas_defined, last_updated, personas]
properties:
  personas_defined:
    type: integer
  last_updated:
    type: string
    format: date
  personas:
    type: array
    items:
      type: object
      required: [name, role, goals, pain_points]
      properties:
        name: { type: string, description: "Persona archetype name" }
        role: { type: string }
        goals: { type: array, items: { type: string } }
        pain_points: { type: array, items: { type: string } }
        tech_comfort: { type: string, enum: [low, medium, high] }
        usage_frequency: { type: string, enum: [daily, weekly, monthly, occasional] }
        design_implications: { type: array, items: { type: string } }
