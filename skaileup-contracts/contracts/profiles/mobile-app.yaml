profile: mobile-app
description: "Mobile application — similar to web-app but with mobile-specific paths"
version: 1

artifacts:
  onboarding-profile:
    path: "_grounding/onboarding/profile.yaml"
    type: yaml
    lifecycle: input

  onboarding-decisions:
    path: "_grounding/onboarding/decisions.yaml"
    type: yaml
    lifecycle: input

  seeds:
    path: "_seeds/"
    type: directory
    lifecycle: input

  research-domain:
    path: "_grounding/research/domain.md"
    type: markdown
    lifecycle: grounding

  research-competitors:
    path: "_grounding/research/competitors.md"
    type: markdown
    lifecycle: grounding

  research-audiences:
    path: "_grounding/research/audiences.md"
    type: markdown
    lifecycle: grounding

  research-design-inspiration:
    path: "_grounding/research/design-inspiration.md"
    type: markdown
    lifecycle: grounding

  brief:
    path: "discovery/brief.md"
    type: markdown

  goals:
    path: "discovery/goals.md"
    type: markdown

  comparable:
    path: "discovery/comparable.md"
    type: markdown

  brand-identity:
    path: "discovery/brand/identity.md"
    type: markdown

  brand-tokens:
    path: "discovery/brand/tokens.json"
    type: json

  journeys:
    path: "experience/journeys/stories.json"
    type: json

  features:
    path: "experience/features/"
    type: directory
    children: numbered-groups

  screens:
    path: "experience/screens/"
    type: directory
    children: numbered-groups

  behaviors:
    path: "experience/behaviors/"
    type: directory

  prototype:
    path: "prototype/"
    type: directory
    variants:
      mock: "prototype/mockups/"

  techstack:
    path: "blueprint/techstack.md"
    type: markdown

  architecture:
    path: "blueprint/architecture.md"
    type: markdown

  datamodel:
    path: "blueprint/datamodel/"
    type: directory

  standards:
    path: "_standards/"
    type: directory
    lifecycle: reference

excluded:
  - prototype.storybook
