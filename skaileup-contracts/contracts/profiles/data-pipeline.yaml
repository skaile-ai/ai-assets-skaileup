profile: data-pipeline
description: "Data pipeline — stages instead of features, no UI"
version: 1

artifacts:
  onboarding-profile:
    path: "_grounding/onboarding/profile.yaml"
    type: yaml
    lifecycle: input

  onboarding-decisions:
    path: "_grounding/onboarding/decisions.yaml"
    type: yaml
    lifecycle: input

  seeds:
    path: "_seeds/"
    type: directory
    lifecycle: input

  research-domain:
    path: "_grounding/research/domain.md"
    type: markdown
    lifecycle: grounding

  brief:
    path: "overview/brief.md"
    type: markdown

  features:
    path: "stages/"
    type: directory
    label: "Pipeline Stages"

  techstack:
    path: "toolchain/stack.md"
    type: markdown

  architecture:
    path: "toolchain/architecture.md"
    type: markdown

  datamodel:
    path: "data/schema/"
    type: directory

  standards:
    path: "_standards/"
    type: directory
    lifecycle: reference

excluded:
  - journeys
  - screens
  - brand-identity
  - brand-tokens
  - prototype
  - behaviors
  - comparable
  - goals
