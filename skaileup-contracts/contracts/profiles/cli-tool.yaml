profile: cli-tool
description: "CLI application — commands instead of UI features, no screens or brand"
version: 1

artifacts:
  onboarding-profile:
    path: "_grounding/onboarding/profile.yaml"
    type: yaml
    lifecycle: input

  onboarding-decisions:
    path: "_grounding/onboarding/decisions.yaml"
    type: yaml
    lifecycle: input

  seeds:
    path: "_seeds/"
    type: directory
    lifecycle: input

  research-domain:
    path: "_grounding/research/domain.md"
    type: markdown
    lifecycle: grounding

  research-competitors:
    path: "_grounding/research/competitors.md"
    type: markdown
    schema: competitors-v1
    lifecycle: grounding

  brief:
    path: "overview/brief.md"
    type: markdown

  features:
    path: "commands/"
    type: directory
    label: "Commands"

  techstack:
    path: "toolchain/stack.md"
    type: markdown

  architecture:
    path: "toolchain/architecture.md"
    type: markdown

  datamodel:
    path: "data/model.md"
    type: markdown

  standards:
    path: "_standards/"
    type: directory
    lifecycle: reference

excluded:
  - journeys
  - screens
  - brand-identity
  - brand-tokens
  - prototype
  - behaviors
  - comparable
  - goals
