id: improve-skill
version: "1.0.0"
name: "Improve Skill"
description: "Iterate: mutate skill, validate, score, keep or revert improvements"
entry: baseline
nodes:
  - id: baseline
    type: skill
    data:
      skill: lab-validate
      label: "Run baseline validation"
  - id: improve
    type: skill
    data:
      skill: lab-improve
      label: "Propose and apply mutation"
  - id: validate
    type: skill
    data:
      skill: lab-validate
      label: "Validate after mutation"
  - id: report
    type: skill
    data:
      skill: lab-report
      label: "Generate improvement report"
edges:
  - { id: e1, source: baseline, target: improve, type: flow }
  - { id: e2, source: improve, target: validate, type: flow }
  - { id: e3, source: validate, target: report, type: flow }
