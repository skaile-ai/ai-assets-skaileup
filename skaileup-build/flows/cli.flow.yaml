id: "cli"
version: "2.0.0"
name: "CLI Implementation"
description: "Implementation pipeline for command-line tools. No UI shell, no design pass, no E2E. Scaffold, foundation (headless), optional migrate/seed, feature TDD, unit and integration tests, verify."
metadata:
  tags:
    - "cli"
    - "implementation"
    - "no-ui"
    - "tdd"
  stage: "stable"
  icon: "i-heroicons-command-line"
  category: "cli"
globals:
  research_depth: "skip"
  approval_mode: "checkpoint"
  auto_review: false
  subagent_mode: true
  verbosity: "standard"
  cli_mode: true
modes:
  research:
    enabled: false
  standards:
    enabled: false
artifact_handoff:
  from_concept:
    - features
    - datamodel
    - techstack
    - architecture
    - onboarding-decisions
entry: "scaffold"
nodes:
  - id: "g-implement"
    type: "group"
    position:
      x: 0
      y: 0
    style:
      width: 1280
      height: 320
      backgroundColor: "rgba(16,185,129,0.04)"
      border: "1px solid rgba(16,185,129,0.2)"
      borderRadius: "12px"
    data:
      label: "Implementation"
      phase: "implementation"
  - id: "scaffold"
    type: "skill"
    parentNode: "g-implement"
    position:
      x: 40
      y: 140
    data:
      skill: "skailup-scaffold"
      label: "Scaffold"
      optional: false
      parameters:
        project_type: "cli"
        package_manager: "bun"
  - id: "foundation"
    type: "skill"
    parentNode: "g-implement"
    position:
      x: 280
      y: 140
    data:
      skill: "skailup-foundation"
      label: "Foundation"
      optional: true
      parameters:
        skip_ui_shell: true
  - id: "migrate"
    type: "skill"
    parentNode: "g-implement"
    position:
      x: 520
      y: 60
    data:
      skill: "skailup-migrate"
      label: "Migrate"
      optional: true
  - id: "seed"
    type: "skill"
    parentNode: "g-implement"
    position:
      x: 520
      y: 220
    data:
      skill: "skailup-seed"
      label: "Seed"
      optional: true
  - id: "implement-feature"
    type: "skill"
    parentNode: "g-implement"
    position:
      x: 760
      y: 140
    data:
      skill: "skailup-implement-feature"
      label: "Feature"
      optional: false
      subagent: true
      parameters:
        tdd: true
  - id: "test-unit"
    type: "skill"
    parentNode: "g-implement"
    position:
      x: 1000
      y: 60
    data:
      skill: "skailup-test-unit"
      label: "Unit Tests"
      optional: false
      subagent: true
  - id: "test-integration"
    type: "skill"
    parentNode: "g-implement"
    position:
      x: 1000
      y: 200
    data:
      skill: "skailup-test-integration"
      label: "Integration Tests"
      optional: false
      subagent: true
  - id: "verify"
    type: "skill"
    parentNode: "g-implement"
    position:
      x: 1240
      y: 140
    data:
      skill: "verify"
      label: "Verify"
      optional: false
      subagent: true
edges:
  - id: "e-scaffold-foundation"
    source: "scaffold"
    target: "foundation"
    type: "optional"
  - id: "e-scaffold-migrate"
    source: "scaffold"
    target: "migrate"
    type: "optional"
  - id: "e-scaffold-feature"
    source: "scaffold"
    target: "implement-feature"
    type: "flow"
  - id: "e-foundation-feature"
    source: "foundation"
    target: "implement-feature"
    type: "optional"
  - id: "e-migrate-seed"
    source: "migrate"
    target: "seed"
    type: "optional"
  - id: "e-feature-unit"
    source: "implement-feature"
    target: "test-unit"
    type: "flow"
  - id: "e-feature-integration"
    source: "implement-feature"
    target: "test-integration"
    type: "flow"
  - id: "e-unit-verify"
    source: "test-unit"
    target: "verify"
    type: "flow"
  - id: "e-integration-verify"
    source: "test-integration"
    target: "verify"
    type: "flow"
next_flows:
  - id: "audit"
    domain: "skaileup-quality"
    label: "Audit →"
    hint: "Run static analysis and structure audit on the CLI codebase."
