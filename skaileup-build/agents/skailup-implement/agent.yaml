spec_version: "0.1.0"
name: "skailup-implement"
version: "1.0.0"
description: "Implementation pipeline orchestrator — drives the full implementation lifecycle from project scaffolding through TDD feature development, UAT, and final verification. Consumes _concept/ artifacts from the concept pipeline."
extends: "../../../ai-asset-management/agents/skaile/agent.yaml"
model:
  preferred: "claude-opus-4-6"
  fallback:
    - "claude-sonnet-4-6"
  constraints:
    temperature: 0.1
    max_tokens: 8192
delegation:
  mode: "explicit"
runtime:
  max_turns: 200
  timeout: 3600
author: "skaile"
license: "MIT"
tags:
  - "orchestrator"
  - "implementation-pipeline"
  - "scaffolding"
  - "tdd"
  - "uat"
  - "verification"
  - "plans"
metadata:
  domain: "skaileup-implementation"
  skill_merged: "skills/skailup-implement/SKILL.md"
  phases: "Setup, Features, UAT, Verification"
  complexity_tiers: "small, standard, complex"
  consumes: "_concept/ artifacts (1_discovery, 2_experience, 3_blueprint)"
  produces: "Committed tested code, PLANS.md implementation progress, LEARNINGS.md"
  resume: "reads PLANS.md if present — resumes from last incomplete step"
  expert_routing: "Searches skailup-prog-expert-* skills for tech-stack-specific guidance"
  stage: "alpha"
